  - id: "local-partnership-letters-1969-october-md-01"
    text: |
      (1) 在这封信里，我会给大家介绍比尔·鲁安 (Bill Ruane)。综合考虑人品、能力以及是否能长期接纳我们的所有合伙人，在我认识的所有资产管理人中，比尔·鲁安是最佳人选。我还会分析一下在当前情况下如何决定债券和股票的配比，以及各种决策的预期。 (2) 11 月末：我会按照合同规定，提前 30 天正式通知各位，就我在年底从合伙基金退休的打算发出声明。 (3) 12 月初：我会将我们的控股公司的公开资料寄给各位并进行一些简单的介绍。我们的两家控股公司是伯克希尔哈撒韦 (Berkshire Hathaway Inc.)（拥有纺织业务、伊利诺伊国民银行、罗克福德信托公司、国民赔偿公司、国民火灾与海事保险公司以及太阳报业）和多元零售公司 (Diversified Retailing Company)（拥有霍赫希尔德•科恩公司和联合棉布商店）。控股公司的股票会在 1 月份分配给大家。在各位决定持有、卖出或买入之前，我希望各位能有足够的时间研究这些公司的相关材料。到时候，我会向各位合伙人征集问题，请各位合伙人以书面的形式将问题发送给我（为保证所有合伙人都获得一样的信息，我不会与各位单独讨论这些公司）。12 月末，我会再写一封信给各位，集中解答收到的所有问题。我预计我们会作出安排，如果合伙人愿意的话，可以将控股公司股份立即变现。 (4) 1 月 5 日左右：(a) 将现金分配给合伙人，分配比例为各位合伙人 1969 年 1 月 1 日资本的 56% 以上（如果年末之前能将更多的股份卖出，现金分配比例会更高），其中会扣除 1969 年向合伙人每月发放的利息或贷款；(b) 将多元零售公司和伯克希尔哈撒韦公司的股份按权益比例分配给合伙人。如果合伙人将自己分配到的控股公司股份卖出，可获得其 1969 年 1 月 1 日资本的 30% - 35%（我会在年末给出控股公司的估值）。 在年末之前，我们卖出的股票数量可能远远高于预期，1 月初的现金分配比例可能高于上述的 56%。如果卖出股票的数量未达到预期，我们将先分配一部分现金，并在 1970 年上半年继续卖出。我们将选择合适的时机卖出剩余资产，预计 1970 年 6 月 30 日之后，我们剩余的资产价值将不到当前资产价值的 10%。在所有资产和负债都清理完毕后，我们将进行一次最终分配。 1969 年，除非市场出现大跌，我仍然认为，不计算每月的利息，我们的收益会持平。我们运气很好，如果不是今年清算了，我们的业绩会差很多。之前，我发现了一些“长期”看好的机会。到目前为止，这些机会整体表现欠佳。在我们持有的仓位中，现在规模较大的股票只剩两只了。其中一只，在我写这封信时，我们正在卖出。另外一只是蓝筹印花 (Blue Chip Stamps)，我们持有它流通股的 7.5%，它现在流动性有限，但是今年年末可能会发行上市，到时看市场情况如何，我们可能会把这部分股票卖出。 (5) 1970 年 3 月 1 日：约翰•哈丁将离开巴菲特合伙基金，为 Ruane, Cunniff & Stires公司在奥马哈开设办事处。比尔•斯科特和我会留在我们的办公室，帮助有需要的合伙人购买免税或应税债券。我们会把三月份的时间留出来，免费帮助希望购买债券的合伙人。我们有分析和购买债券的经验，而且我们买债券的手续费低，所以我们应该能帮合伙人选出比较好的债券，而且还能省不少费用。4 月 1 日之后，我们将不再提供任何私人咨询服务。 (6) 1970 年 3 月以后：比尔和我仍然会留在基威特大厦的办公室，只拿出很少的时间来完成巴菲特合伙基金清算收尾工作，包括申报 1970 年的税项，可能还要在 1971 年继续处理剩余的一小部分资产和负债。
    source_page: "partnership-letters/1969-october.md"
