      "我们的最后一项优势是弥漫在伯克希尔的、难以复制的企业文化。在商业世界里，文化至关重要。"
    source_page: "concepts/企业文化"
    type: "web-quote"
    extraction_source: "website"
    tags: ["企业文化", "管理"]
