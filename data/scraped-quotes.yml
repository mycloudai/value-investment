    source_letter_year: 1991
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-特许经营权-07"
    text: |
      相比之下，"普通企业"只有在它是低成本运营商或者其产品/服务供不应求时，才能获得超额利润。但供给紧张通常持续不了多久。
    source_page: "concepts/特许经营权"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["特许经营权", "护城河"]
    attribution: "1991 巴菲特致股东信"
    source_letter_year: 1991
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-特许经营权-08"
    text: "那种刀枪不入的特许经营权和取之不尽的丰裕暴利的时代，已经一去不复返了。"
    source_page: "concepts/特许经营权"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["特许经营权", "护城河"]
    attribution: "1991 巴菲特致股东信"
    source_letter_year: 1991
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-特许经营权-09"
    text: "拥有喜诗让我们学到了很多关于如何评估特许经营权的知识。我们在某些股票投资上赚到了可观的收益，正是因为在喜诗身上学到的这些功课。"
    source_page: "concepts/特许经营权"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["特许经营权", "护城河"]
    attribution: "1991 巴菲特致股东信"
    source_letter_year: 1991
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-留存收益-01"
    text: |
      "我们检验留存收益是否明智的标准是：随着时间推移，每留存1美元是否能为股东带来至少1美元的市场价值。到目前为止，这个标准尚能达到。我们将继续以每五年为一个滚动周期来检验。随着净资产的增长，明智地运用留存收益将越来越难。"
    source_page: "concepts/留存收益"
    type: "web-quote"
    extraction_source: "website"
    tags: ["留存收益", "资本配置"]
    attribution: "1983 巴菲特致股东信"
    source_letter_year: 1983
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-留存收益-02"
    text: |
      "当资本回报率平平无奇时，靠投入更多资本来赚更多钱算不上什么了不起的管理成就。你坐在摇椅上也能做到这一点
    source_page: "concepts/留存收益"
    type: "web-quote"
    extraction_source: "website"
    tags: ["留存收益", "资本配置"]
    attribution: "只要把存进银行的资金翻两番，利息收入也会翻两番。\"——1985 巴菲特致股东信"
    source_letter_year: 1985
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-留存收益-03"
    text: |
      "只要每一美元留存收益能为股东创造超过一美元的市场价值，伯克希尔就不分红。"
    source_page: "concepts/留存收益"
    type: "web-quote"
    extraction_source: "website"
    tags: ["留存收益", "资本配置"]
    attribution: "2014 副董事长的思考"

  - id: "web-concepts-留存收益-04"
    text: |
      "那些未入账的留存收益通常正在为伯克希尔创造价值
    source_page: "concepts/留存收益"
    type: "web-quote"
    extraction_source: "website"
    tags: ["留存收益", "资本配置"]
    attribution: "而且是大量的价值。被投资公司用留存的资金扩张业务、进行收购、偿还债务，还经常回购自家股票（这一举动增加了我们在它们未来收益中的份额）。留存收益贯穿美国历史，推动着美国企业向前发展。\"——2020 巴菲特致股东信"
    source_letter_year: 2020
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-留存收益-05"
    text: |
      "我们的股东将继续通过公司留存收益来积累财富、日益兴旺。"
    source_page: "concepts/留存收益"
    type: "web-quote"
    extraction_source: "website"
    tags: ["留存收益", "资本配置"]
    attribution: "2022 巴菲特致股东信"
    source_letter_year: 2022
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-留存收益-06"
    text: |
      "我们认为崇高的意图应当定期接受结果的检验。我们检验留存收益是否明智的标准是：随着时间推移，每留存1美元是否能为股东带来至少1美元的市场价值。到目前为止，这个标准尚能达到。我们将继续以每五年为一个滚动周期来检验。"
    source_page: "concepts/留存收益"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["留存收益", "资本配置"]
    attribution: "1983 巴菲特致股东信"
    source_letter_year: 1983
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-留存收益-07"
    text: |
      "作为你们资本的管理人，伯克希尔的董事们选择了保留全部收益不做分配。事实上，2015年和2016年，伯克希尔的留存收益金额在美国企业中均位列第一，每年的再投资金额比第二名多出数十亿美元。这些再投资的资金必须赚回自己的存在价值。"
    source_page: "concepts/留存收益"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["留存收益", "资本配置"]
    attribution: "2016 巴菲特致股东信"
    source_letter_year: 2016
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-留存收益-08"
    text: |
      "报告收益很难准确反映伯克希尔的经济进步，部分原因在于表中列示的数字仅包括被投资公司分配给我们的股利
    source_page: "concepts/留存收益"
