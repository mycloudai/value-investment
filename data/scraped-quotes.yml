  - id: "local-partnership-letters-1970-february-md-01"
    text: |
      （1）收费公路、电力、水务等拥有巨额收入的大型公共事业公司发行的债券。许多此类债券的市场活跃程度非常高，很容易对发行主体进行定量分析，有的设有偿债基金，有的还具有其他有利因素，但被市场忽略了，没得到公允估值。 （2）政府工业发展债券。有的政府部门将资产租赁给私营公司，这些政府部门可以发行此类债券。例如，俄亥俄州洛兰市拥有一个8000万美元的项目，租赁给了美国钢铁公司。政府发展部门发行债券筹集项目所需资金，并与美国钢铁公司签订绝对净租赁合约，用于偿还债券款项。为此类债券做信用背书的不是相关城市或州，这些债券的信用如何，主要取决于承租的公司。此类债券规模有几十亿，背后是许多大公司在支持，但是由于税法的变化，新发行的此类债券规模很小（每个项目平均不到500万美元）。在很长一段时间里，由于人们对此类债券存在很大的偏见，与信用状况类似的债券相比，它们的收益率高得多。人们的这种偏见在逐渐减弱，此类债券的溢价收益率也在降低，但是我觉得它们的收益率还是相当高的。我们的保险公司持有的大部分债券都是这个类型的。 （3）如果你希望购买评级最高的免税债券，可以选择公共住房管理局发行的品种。这些债券由美国政府担保，它们的评级都是AAA。在有些州，受当地税法影响，本州发行的品种具有溢价，而且前两类债券都不符合你的需求，我会向你推荐公共住房管理局发行的品种，我不会从其他债券中选择，因为我不了解它们的信用状况。要是各位要求我购买你们所在州的债券，提前知会各位一下，我可能购买大量公共住房管理局发行的品种。此类品种用不着分散，它们的信用评级是最高的。 （4）州政府直接或间接承担的债务。
