  - id: "web-concepts-税收效率-01"
    text: |
      "从经济实质来看，这笔负债更像是美国财政部给我们的一笔无息贷款，而且到期日由我们自己说了算。"
    source_page: "concepts/税收效率"
    type: "web-quote"
    extraction_source: "website"
    tags: ["税收效率", "资本配置"]
    attribution: "1989 巴菲特致股东信"
    source_letter_year: 1989
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-税收效率-02"
    text: |
      "造成如此惊人差距的唯一原因，就是纳税时间的不同。有趣的是，政府在方案二中的收益也是完全相同的27:1的比例
    source_page: "concepts/税收效率"
    type: "web-quote"
    extraction_source: "website"
    tags: ["税收效率", "资本配置"]
    attribution: "当然，政府得等上更长时间才能拿到这笔钱。\""
    source_letter_year: 1989
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-税收效率-03"
    text: |
      "查理跟我认为伯克希尔缴纳巨额税款完全天经地义。我们对社会的贡献，充其量也只是与社会对我们的贡献成正比而已。"
    source_page: "concepts/税收效率"
    type: "web-quote"
    extraction_source: "website"
    tags: ["税收效率", "资本配置"]
    attribution: "1996 巴菲特致股东信"
    source_letter_year: 1996
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-税收效率-04"
    text: |
      "对所有需要纳税的股东而言，'分红法'的税收后果不如
    source_page: "concepts/税收效率"
    type: "web-quote"
    extraction_source: "website"
    tags: ["税收效率", "资本配置"]
    attribution: "通常远不如——'卖出法'。\""
    source_letter_year: 2012
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-竞争优势-02"
    text: |
      "在核心业务
    source_page: "concepts/竞争优势"
    type: "web-quote"
    extraction_source: "website"
    tags: ["竞争优势", "护城河"]
    attribution: "低成本汽车和住宅保险——方面，盖可保险拥有重大且可持续的竞争优势。这在商业领域是一种稀缺资产，在金融服务领域更是几乎不存在。\""
    source_letter_year: 1984
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-竞争优势-03"
    text: |
      "我们这种罕见而难以复制的管理架构，赋予了伯克希尔真正的竞争优势。"
    source_page: "concepts/竞争优势"
    type: "web-quote"
    extraction_source: "website"
    tags: ["竞争优势", "护城河"]
    attribution: "2007 巴菲特致股东信"
    source_letter_year: 2007
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-竞争优势-04"
    text: |
      "在物色新的独立业务时，我们寻找的关键品质包括：持久的竞争优势；有能力且品格高尚的管理层；运营所需净有形资产的良好回报率；以诱人的回报率实现内部增长的机会；以及最后
    source_page: "concepts/竞争优势"
    type: "web-quote"
    extraction_source: "website"
    tags: ["竞争优势", "护城河"]
    attribution: "合理的收购价格。\""
    source_letter_year: 2017
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-竞争优势-05"
    text: |
      "长期以来，企业集团通常只做一件事：整体收购其他企业。然而，这个策略带来了两个大问题。第一个无法解决：大多数真正伟大的企业根本不愿意被任何人收购。因此，饥渴的收购者们不得不将目标瞄准那些缺乏重要且持久竞争优势的平庸公司。那可不是一个钓鱼的好池塘。"
    source_page: "concepts/竞争优势"
    type: "web-quote"
    extraction_source: "website"
    tags: ["竞争优势", "护城河"]
    attribution: "2020 巴菲特致股东信"
    source_letter_year: 2020
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-竞争优势-06"
    text: |
      "我们愿意以部分或全部股权的方式买入具有竞争优势的企业，再加上对买入价格的合理自律，应该能给我们实现这一目标的良好机会。"
    source_page: "concepts/竞争优势"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["竞争优势", "护城河"]

  - id: "web-concepts-竞争优势-07"
    text: |
      "品牌的力量、产品的特质和分销体系的优势赋予了它们巨大的竞争优势，犹如一道宽阔的护城河保卫着它们的经济城堡。相比之下，普通企业每天都要在没有任何类似保护的情况下厮杀求生。"
    source_page: "concepts/竞争优势"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["竞争优势", "护城河"]

  - id: "web-concepts-竞争优势-08"
    text: |
      "持久的竞争优势；有能力且品格高尚的管理层；运营所需净有形资产的良好回报率；以诱人的回报率实现内部增长的机会；以及最后——合理的收购价格。"
    source_page: "concepts/竞争优势"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["竞争优势", "护城河"]

  - id: "web-concepts-竞争优势-09"
    text: |
      "在核心业务——低成本汽车和住宅保险——方面，盖可保险拥有重大且可持续的竞争优势。这在商业领域是一种稀缺资产，在金融服务领域更是几乎不存在。"
    source_page: "concepts/竞争优势"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["竞争优势", "护城河"]

  - id: "web-concepts-竞争优势-10"
    text: |
      "我们面临的最大劣势是规模：在早年，我们只需要好的投资点子，但现在我们需要的是又大又好的投资点子。不幸的是，找到这类机会的难度与我们的财务成功成正比，这个问题持续侵蚀着我们的竞争优势。"
    source_page: "concepts/竞争优势"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["竞争优势", "护城河"]

  - id: "web-concepts-管理层-02"
    text: |
      "我们被投资公司之所以能拥有如此多的额外价值，完全要归功于正在管理它们的这批经理人。查理跟我可以毫不心虚地夸耀这支团队，因为他们所具备的才能跟我们一点关系都没有。我们的工作只不过是发现有才华的经理人，并为他们提供一个可以大展身手的环境。"
    source_page: "concepts/管理层"
    type: "web-quote"
    extraction_source: "website"
    tags: ["管理层", "企业治理"]
    attribution: "1990 巴菲特致股东信"
    source_letter_year: 1990
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-管理层-03"
    text: |
      "在伯克希尔，经理人可以专注于经营各自的业务：他们不用参加总部会议，不用操心融资，也不用应付华尔街的骚扰……我们信任的是人，而不是流程。'招好人，少管理'这条准则对他们和我都适用。"
    source_page: "concepts/管理层"
    type: "web-quote"
    extraction_source: "website"
    tags: ["管理层", "企业治理"]
    attribution: "2010 巴菲特致股东信"
    source_letter_year: 2010
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-管理层-04"
    text: |
      "要想赢得好经理人的名声，关键是要收购好企业。"
    source_page: "concepts/管理层"
    type: "web-quote"
    extraction_source: "website"
    tags: ["管理层", "企业治理"]
    attribution: "汤姆·墨菲，引自2019 巴菲特致股东信"
    source_letter_year: 2019
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-管理层-05"
    text: |
      "之所以能取得这样的成果，要归功于一支卓越的经理人团队
    source_page: "concepts/管理层"
    type: "web-quote"
    extraction_source: "website"
    tags: ["管理层", "企业治理"]
    attribution: "是他们在一些看似平凡的业务中创造了非凡的成绩。凯西·斯坦格尔把管理棒球队形容为'靠着别人打出的全垒打来领薪水'。这也正是我在伯克希尔的讨巧之处。\""
    source_letter_year: 1994
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-管理层-06"
    text: |
      "一个企业所有者——或投资者——如果能与这样的人在经济特质良好的企业中联手，就能创造奇迹。反过来，无论一家公司的前景多么诱人，我们都不愿与缺乏令人钦佩品质的管理者为伍。跟坏人做生意永远不会有好结果。"
    source_page: "concepts/管理层"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["管理层", "企业治理"]

  - id: "web-concepts-管理层-07"
    text: |
      "他经营公司的感觉就好像那是'他自己的'事业一样——这种态度正是我们在伯克希尔最为珍视的。"
    source_page: "concepts/管理层"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["管理层", "企业治理"]

  - id: "web-concepts-管理层-08"
    text: |
      "出于充分的理由，我一直在赞扬我们旗下经理人的成就。他们确实是全明星，经营各自的企业就像那是自己家族唯一的资产一样。"
    source_page: "concepts/管理层"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["管理层", "企业治理"]

  - id: "web-concepts-管理层-09"
    text: |
      "在伯克希尔，经理人可以专注于经营各自的业务：他们不用参加总部会议，不用操心融资，也不用应付华尔街的骚扰。他们只是每两年收到我的一封信，有事的时候给我打个电话。"
    source_page: "concepts/管理层"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["管理层", "企业治理"]

  - id: "web-concepts-纺织业务-01"
    text: |
      "一份优异的管理记录（以经济回报衡量），与其说取决于你划船的技术有多好，不如说取决于你上了哪条船。"
    source_page: "concepts/纺织业务"
    type: "web-quote"
    extraction_source: "website"
    tags: ["纺织", "伯克希尔"]
    attribution: "1985 巴菲特致股东信"
    source_letter_year: 1985
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-纺织业务-02"
    text: |
      "我花了整整20年才搞明白买好企业有多重要。在那之前，我一直在寻找'便宜货'
    source_page: "concepts/纺织业务"
    type: "web-quote"
    extraction_source: "website"
    tags: ["纺织", "伯克希尔"]
    attribution: "不幸的是还真被我找到了一些。\""
    source_letter_year: 1987
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-纺织业务-03"
    text: |
      "查理
    source_page: "concepts/纺织业务"
    type: "web-quote"
    extraction_source: "website"
    tags: ["纺织", "伯克希尔"]
    attribution: "加上我在伯克希尔接手纺织业务后长达20年的苦苦挣扎——最终让我确信，拥有一家出色企业的非控股权，比百分之百控股一家勉强赚钱的企业更赚钱、更愉快，而且工作量少得多。\""
    source_letter_year: 2020
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-纺织业务-04"
    text: |
      "合并后的九年里，伯克希尔的股东们眼睁睁看着公司的净资产从5,140万美元暴跌至2,210万美元......新英格兰纺织业已经悄悄步入了一场漫长而不可逆转的死亡行军。"
    source_page: "concepts/纺织业务"
    type: "web-quote"
    extraction_source: "website"
    tags: ["纺织", "伯克希尔"]
    attribution: "2021 巴菲特致股东信"
    source_letter_year: 2021
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-纺织业务-05"
    text: |
      "我们纺织业务最近一次供不应求的时期——那已经是好多年前的事了——大概持续了一个上午的大部分时间。"
    source_page: "concepts/纺织业务"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["纺织", "伯克希尔"]
    attribution: "1982 巴菲特致股东信"
    source_letter_year: 1982
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-纺织业务-06"
    text: |
      "纺织投资所许诺的收益只是一种幻象。我们许多国内外的竞争对手都在进行同样的投资，一旦足够多的公司这样做了，降低的成本就变成了全行业降价的基准。单独来看，每家公司的资本投资决策看起来都合乎成本效益、都很理性；但从整体来看，这些决策相互抵消，变得完全不理性——就好比每个看游行的人都觉得踮起脚尖就能看得更清楚一样。每一轮投资过后，所有参与者在游戏中投入了更多的钱，但回报依然少得可怜。"
    source_page: "concepts/纺织业务"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["纺织", "伯克希尔"]
    attribution: "1985 巴菲特致股东信"
    source_letter_year: 1985
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-纺织业务-07"
    text: |
      "这对股东来说是毁灭性的结局，它说明了当大量的智力和精力被投入到一个错误的前提上时会发生什么。这情景让人想起塞缪尔·约翰逊的那匹马：'一匹会数到十的马是一匹了不起的马——但不是一个了不起的数学家。'同样地，一家在本行业中能够出色配置资本的纺织公司是一家了不起的纺织公司——但不是一家了不起的企业。"
    source_page: "concepts/纺织业务"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["纺织", "伯克希尔"]
    attribution: "1985 巴菲特致股东信"
    source_letter_year: 1985
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-纺织业务-08"
    text: |
      "当一个以管理才能著称的管理层遇上一家基本面糟糕的企业时，保持完好无损的是企业的名声。"
    source_page: "concepts/纺织业务"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["纺织", "伯克希尔"]
    attribution: "1985 巴菲特致股东信"
    source_letter_year: 1985
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-纺织业务-09"
    text: |
      "我希望这门生意能成功，于是一厢情愿地做出了一连串糟糕的决定。（我甚至又买了一家新英格兰纺织厂。）但一厢情愿只在迪士尼电影里能梦想成真；在商业上，它是毒药。"
    source_page: "concepts/纺织业务"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["纺织", "伯克希尔"]
    attribution: "2012 巴菲特致股东信"
    source_letter_year: 2012
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-股东导向-01"
    text: |
      "虽然我们的形式是公司制，但我们的态度是合伙关系。查理·芒格跟我把股东视为所有者合伙人，而我们自己则是执行合伙人。"
    source_page: "concepts/股东导向"
    type: "web-quote"
    extraction_source: "website"
    tags: ["股东导向", "公司治理"]
    attribution: "1983 巴菲特致股东信"
    source_letter_year: 1983
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-股东导向-02"
    text: |
      "虽然我们的首要目标是让全体伯克希尔股东从持股中获取的总收益最大化，但我们同样希望尽量减少某些股东以牺牲其他股东利益来获利的情形。"
    source_page: "concepts/股东导向"
    type: "web-quote"
    extraction_source: "website"
    tags: ["股东导向", "公司治理"]
    attribution: "1996 巴菲特致股东信"
    source_letter_year: 1996
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-股东导向-03"
    text: |
      "我们不断寻找那些业务容易理解、经济特征持久且令人垂涎、由有能力且以股东利益为导向的管理层经营的大型企业。"
    source_page: "concepts/股东导向"
    type: "web-quote"
    extraction_source: "website"
    tags: ["股东导向", "公司治理"]
    attribution: "1991 巴菲特致股东信"
    source_letter_year: 1991
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-股东导向-04"
    text: |
      "没有哪家公司会比伯克希尔更重视股东利益。30多年来，我们每年都会重申我们的《股东原则》，开头总是那句话：'虽然我们的形式是公司制，但我们的态度是合伙制。'这个与你们之间的承诺是刻在石头上的。"
    source_page: "concepts/股东导向"
    type: "web-quote"
    extraction_source: "website"
    tags: ["股东导向", "公司治理"]
    attribution: "2014 伯克希尔的过去现在与未来"
    source_letter_year: 2014
    source_letter_category: "special-letter"

  - id: "web-concepts-股东导向-05"
    text: |
      "在极少数Murph的个人利益与股东利益有所偏差的时候，他毫不犹豫地站在股东这边。"
    source_page: "concepts/股东导向"
    type: "web-quote"
    extraction_source: "website"
    tags: ["股东导向", "公司治理"]
    attribution: "1995 巴菲特致股东信，评价汤姆·墨菲"
    source_letter_year: 1995
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-股东导向-06"
    text: |
      "虽然我们的形式是公司制，但我们的态度是合伙关系。查理·芒格跟我把股东视为所有者合伙人，而我们自己则是执行合伙人。我们并不把公司本身视为企业资产的最终拥有者，而是将公司看作一个渠道——通过这个渠道，股东们拥有这些资产。"
    source_page: "concepts/股东导向"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["股东导向", "公司治理"]

  - id: "web-concepts-股东导向-07"
    text: |
      "秉持这种所有者导向，我们的董事全部都是伯克希尔的主要股东。五位董事中至少有四位，其家族净资产的一半以上都是伯克希尔的股份。我们自己吃自己做的菜。"
    source_page: "concepts/股东导向"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["股东导向", "公司治理"]

  - id: "web-concepts-股东导向-08"
    text: |
      "虽然我们的首要目标是让全体伯克希尔股东从持股中获取的总收益最大化，但我们同样希望尽量减少某些股东以牺牲其他股东利益来获利的情形。这正是我们经营一家家族合伙企业时会追求的目标。"
    source_page: "concepts/股东导向"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["股东导向", "公司治理"]

  - id: "web-concepts-股东导向-09"
    text: |
      "一位妖娆的美女款款走向一位CEO，用那湿润的双唇娇声道：'只要你开口，我什么都愿意做——什么都行。'这位总裁毫不犹豫地回答：'那帮我把股票期权重新定价吧。'"
    source_page: "concepts/股东导向"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["股东导向", "公司治理"]

  - id: "web-concepts-股东导向-10"
    text: |
      "CEO们完全明白这道数学题，他们知道每派出一分钱的红利，所有已发行期权的价值就减少一分。但我从来没有在要求批准固定价格期权计划的股东委托书材料中，看到过对这种管理层与股东利益冲突的说明。"
    source_page: "concepts/股东导向"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["股东导向", "公司治理"]

  - id: "web-concepts-股息-01"
    text: |
      "不受限制的收益只有在以下情况下才应当留存：有合理的前景表明公司每留存一美元，至少能为股东创造一美元的市值。"
    source_page: "concepts/股息"
    type: "web-quote"
    extraction_source: "website"
    tags: ["股息", "股东回报"]
    attribution: "1984 巴菲特致股东信"
    source_letter_year: 1984
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-股息-02"
    text: |
      "伯克希尔目前不派发股息，股票回购完全自主决定。每年到期的债务也微不足道。"
    source_page: "concepts/股息"
    type: "web-quote"
    extraction_source: "website"
    tags: ["股息", "股东回报"]
    attribution: "2023 巴菲特致股东信"
    source_letter_year: 2023
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-股息-03"
    text: |
      "1994年我们从可口可乐收到的现金股息是7,500万美元。到2022年，这笔股息增长到了7.04亿美元。年年增长，跟过生日一样确定。"
    source_page: "concepts/股息"
    type: "web-quote"
    extraction_source: "website"
    tags: ["股息", "股东回报"]
    attribution: "2022 巴菲特致股东信"
    source_letter_year: 2022
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-股息-04"
    text: |
      "请注意一个促成这项破纪录税款的关键因素：在1965年至2024年的同一时期内，伯克希尔股东仅收到过一次现金分红......我不记得当初为什么向伯克希尔董事会提出这个建议。现在想来简直像一场噩梦。"
    source_page: "concepts/股息"
    type: "web-quote"
    extraction_source: "website"
    tags: ["股息", "股东回报"]
    attribution: "2024 巴菲特致股东信"
    source_letter_year: 2024
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-股息-05"
    text: |
      "不受限制的收益只有在以下情况下才应当留存：有合理的前景——最好有历史业绩佐证——表明公司每留存一美元，至少能为股东创造一美元的市值。"
    source_page: "concepts/股息"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["股息", "股东回报"]
    attribution: "1984 巴菲特致股东信"
    source_letter_year: 1984
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-股息-06"
    text: |
      "如果当时这几家公司把赚到的钱全都发掉，我们现在几乎可以肯定一分钱也赚不到——甚至可能连本钱都没有了。"
    source_page: "concepts/股息"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["股息", "股东回报"]
    attribution: "1984 巴菲特致股东信"
    source_letter_year: 1984
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-股息-07"
    text: |
      "1994年我们从可口可乐收到的现金股息是7,500万美元。到2022年，这笔股息增长到了7.04亿美元。年年增长，跟过生日一样确定。查理和我需要做的全部事情就是去兑现可口可乐的季度股息支票。"
    source_page: "concepts/股息"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["股息", "股东回报"]
    attribution: "2022 巴菲特致股东信"
    source_letter_year: 2022
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-能力圈-01"
    text: |
      "以极其务实的态度界定自己的专业能力圈，并在能力圈内果断行事；对于能力圈之外的提议
    source_page: "concepts/能力圈"
    type: "web-quote"
    extraction_source: "website"
    tags: ["能力圈", "投资纪律"]
    attribution: "无论多么诱人——一概不予理会。\""
    source_letter_year: 1984
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-能力圈-02"
    text: |
      "错过自己能力圈以外的大好机会并没有什么罪过。但有几次天大的好机会简直是送到了我嘴边，而且我完全有能力理解其价值，却还是错过了。"
    source_page: "concepts/能力圈"
    type: "web-quote"
    extraction_source: "website"
    tags: ["能力圈", "投资纪律"]
    attribution: "1989 巴菲特致股东信"
    source_letter_year: 1989
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-能力圈-03"
    text: |
      "你只需要能够评估你能力圈之内的公司就够了。能力圈的大小并不重要；但清楚地知道它的边界在哪里，至关重要。"
    source_page: "concepts/能力圈"
