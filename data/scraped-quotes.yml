    text: "我们的最后一项优势是弥漫在伯克希尔的、难以复制的企业文化。在商业世界里，文化至关重要。"
    source_page: "concepts/企业文化"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["企业文化", "管理"]

  - id: "web-concepts-企业文化-07"
    text: |
      有一些我极为敬佩、经营业绩远优于我的管理者，在固定价格期权这个问题上与我意见不同。他们建立了行之有效的企业文化，而固定价格期权是帮助他们的工具之一。通过他们的领导力和以身作则，加上以期权作为激励手段，这些管理者教会了同事们像所有者一样思考。这种文化非常稀有，一旦存在，也许就应该原样保留
    source_page: "concepts/企业文化"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["企业文化", "管理"]
    attribution: "1985 巴菲特致股东信"
    source_letter_year: 1985
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-企业文化-08"
    text: "查理和我相信，伯克希尔内在价值的增长速度长期来看可能会略微超过标普的回报。我们对此充满信心，因为我们拥有一批杰出的企业、一群了不起的运营经理人，以及以股东利益为导向的企业文化。"
    source_page: "concepts/企业文化"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["企业文化", "管理"]
    attribution: "2012 巴菲特致股东信"
    source_letter_year: 2012
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-企业文化-09"
    text: |
      伯克希尔没有全公司范围的预算……我们没有这种工具，意味着母公司从来没有一个要达到的季度"数字"。摒弃这种目标向我们众多经理人传递了一个重要信号，强化了我们所珍视的企业文化。
    source_page: "concepts/企业文化"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["企业文化", "管理"]
    attribution: "2018 巴菲特致股东信"
    source_letter_year: 2018
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-企业文化-10"
    text: "要让国民保险这样运营，需要深植于企业文化中的真正魄力。翻看上面这张表，你可以一眨眼扫过1986年到1999年那些年份。但日复一日地眼看着业务缩水"
    source_page: "concepts/企业文化"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["企业文化", "管理"]
    attribution: "2004 巴菲特致股东信"
    source_letter_year: 2004
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-企业文化-11"
    text: "巴菲特家族的成员将继续留在董事会中。他们不是为了在我去世后经营公司，届时也不会获得任何报酬。他们的使命是，在其他CEO接替我之后，替我们的股东和经理人确保伯克希尔独特的企业文化得到延续。"
    source_page: "concepts/企业文化"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["企业文化", "管理"]
    attribution: "2002 巴菲特致股东信"
    source_letter_year: 2002
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-企业文化-12"
    text: "伯克希尔独特的企业文化已经深植于每家子公司之中，即使我离世，它们的运营也不会有丝毫偏差。"
    source_page: "concepts/企业文化"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["企业文化", "管理"]
    attribution: "2005 巴菲特致股东信"
    source_letter_year: 2005
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-企业文化-13"
    text: "在Mastio 2009年的报告中，科恩河升至第1名，北方天然升至第3名。这一切的实现，要归功于两家管道公司数百名员工全心全意地投入到一种全新的企业文化中，并切切实实地兑现了他们的承诺。"
    source_page: "concepts/企业文化"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["企业文化", "管理"]
    attribution: "2008 巴菲特致股东信"
    source_letter_year: 2008
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-企业文化-14"
    text: "我们收购之前有些子公司已经设有员工配捐计划，我们完全支持他们继续执行：干扰成功的企业文化不是我们的风格。"
    source_page: "concepts/企业文化"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["企业文化", "管理"]
    attribution: "2001 巴菲特致股东信"
    source_letter_year: 2001
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-低估-01"
    text: |
      "我从不试图预测大盘走势
    source_page: "concepts/低估"
    type: "web-quote"
    extraction_source: "website"
    tags: ["低估", "估值"]
    attribution: "我的精力全放在寻找被低估的股票上。\""
    source_letter_year: 1958
    source_letter_category: "partnership-letter"

  - id: "web-concepts-低估-02"
    text: |
      "我们并不在意市场是否会迅速重新估值我们认为价格被低估的证券。事实上，我们宁可不要这样，因为在大多数年份里，我们预期会有资金净流入来买进证券。"
    source_page: "concepts/低估"
    type: "web-quote"
    extraction_source: "website"
    tags: ["低估", "估值"]
    attribution: "1978 巴菲特致股东信"
    source_letter_year: 1978
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-低估-03"
    text: |
      "辛普森始终投资于价值被低估的普通股，这些股票单个来看不太可能造成永久性损失，而作为组合整体来看则接近于无风险。"
    source_page: "concepts/低估"
    type: "web-quote"
    extraction_source: "website"
    tags: ["低估", "估值"]
    attribution: "1986 巴菲特致股东信"
    source_letter_year: 1986
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-低估-04"
    text: |
      "付出的价格低，得到的价值高。每一笔低估类投资的价值都远超价格，自带可观的安全边际。每只单独有安全边际，分散持有多只，便形成了一个既安全又有上涨潜力的投资组合。"
    source_page: "concepts/低估"
    type: "web-quote"
    extraction_source: "website"
    tags: ["低估", "估值"]
    attribution: "1961 巴菲特致合伙人信"
    source_letter_year: 1961
    source_letter_category: "partnership-letter"

  - id: "web-concepts-低估-05"
    text: |
      "一家企业的成功被市场认可的速度其实并不那么重要
    source_page: "concepts/低估"
    type: "web-quote"
    extraction_source: "website"
    tags: ["低估", "估值"]
    attribution: "只要其内在价值在以令人满意的速度增长就行。事实上，被市场发现得晚一些反而是好事：这给了我们更多机会以便宜的价格买进好东西。\""
    source_letter_year: 1987
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-低估-06"
    text: |
      "我从不试图预测大盘走势——我的精力全放在寻找被低估的股票上。"
    source_page: "concepts/低估"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["低估", "估值"]

  - id: "web-concepts-低估-07"
    text: |
      "我们并不在意市场是否会迅速重新估值我们认为价格被低估的证券。事实上，我们宁可不要这样，因为在大多数年份里，我们预期会有资金净流入来买进证券。持续以有吸引力的价格买入，最终给我们带来的好处，很可能超过股价短期飙升到我们不愿继续买入的水平所提供的卖出机会。"
    source_page: "concepts/低估"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["低估", "估值"]

  - id: "web-concepts-低估-08"
    text: |
      "低估类（Generals）——这类投资是低估的股票，判断标准以定量分析为主，但定性因素同样受到高度重视。通常来说，这类投资几乎看不出近期股价上涨的具体催化剂。这些股票既不光鲜，也没有市场追捧。它们唯一的优势就是价格低廉。"
    source_page: "concepts/低估"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["低估", "估值"]

  - id: "web-concepts-低估-09"
    text: |
      "新增的类别是'低估类（相对低估）'。其一，我们的'低估类'投资中一直存在这个细微差别，只是一直没有单独体现；其二，这个小类别已经成长为整体投资组合中越来越重要的一部分。"
    source_page: "concepts/低估"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["低估", "估值"]

  - id: "web-concepts-低估-10"
    text: |
      "这类投资有时很快获利，很多时候需要好几年。买入的时候，往往说不清楚这只股票为什么会涨。但也正因为这些股票黯淡无光、短期没有任何显而易见的催化剂，才有那么便宜的价格。"
    source_page: "concepts/低估"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["低估", "估值"]

  - id: "web-concepts-低估-11"
    text: |
      "一家企业的成功被市场认可的速度其实并不那么重要——只要其内在价值在以令人满意的速度增长就行。事实上，被市场发现得晚一些反而是好事：这给了我们更多机会以便宜的价格买进好东西。"
    source_page: "concepts/低估"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["低估", "估值"]

  - id: "web-concepts-保险业-01"
    text: |
      "自1967年我们首次进入保险行业以来，这个板块一直是推动伯克希尔增长的引擎。"
    source_page: "concepts/保险业"
    type: "web-quote"
    extraction_source: "website"
    tags: ["保险业", "行业"]
    attribution: "2008 巴菲特致股东信"
    source_letter_year: 2008
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-保险业-02"
    text: |
      "当我们赚到承保利润时，我们就相当于在免费使用这笔资金
    source_page: "concepts/保险业"
    type: "web-quote"
    extraction_source: "website"
    tags: ["保险业", "行业"]
    attribution: "更妙的是，持有它们还能获得报酬。\""
    source_letter_year: 2014
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-保险业-03"
    text: |
      "财产意外险是伯克希尔繁荣和增长的核心。我们已经在这个行业经营了57年，虽然规模从1,700万美元增长到830亿美元，增长了近5,000倍，但仍有很大的增长空间。"
    source_page: "concepts/保险业"
    type: "web-quote"
    extraction_source: "website"
    tags: ["保险业", "行业"]
    attribution: "2023 巴菲特致股东信"
    source_letter_year: 2023
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-保险浮存金-01"
    text: |
      "浮存金是我们持有但不拥有的钱。保险业务中之所以存在浮存金，是因为大部分保单要求保户预付保费，更重要的是，从保险公司收到索赔通知到最终解决理赔，通常需要相当长的时间。"
    source_page: "concepts/保险浮存金"
    type: "web-quote"
    extraction_source: "website"
    tags: ["保险浮存金", "保险"]
    attribution: "1994 巴菲特致股东信"
    source_letter_year: 1994
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-保险浮存金-02"
    text: |
      "真正让我们兴奋的是保险业务。不过在详细展开之前，先来聊聊'浮存金'以及如何衡量它的成本。除非你理解这个概念，否则根本无法对伯克希尔的内在价值做出合理的判断。"
    source_page: "concepts/保险浮存金"
    type: "web-quote"
    extraction_source: "website"
    tags: ["保险浮存金", "保险"]
    attribution: "1997 巴菲特致股东信"
    source_letter_year: 1997
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-保险浮存金-03"
    text: |
      "这意味着我们585亿美元的保险'浮存金'
    source_page: "concepts/保险浮存金"
    type: "web-quote"
    extraction_source: "website"
    tags: ["保险浮存金", "保险"]
    attribution: "这些钱不属于我们，但由我们持有并为自己的利益进行投资——其成本低于零。事实上，2008年持有这笔浮存金反而给我们带来了28亿美元的收入。查理和我觉得这买卖可真划算。\"——2008 巴菲特致股东信"
    source_letter_year: 2008
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-保险浮存金-04"
    text: |
      "自1967年收购第一家财产意外险公司以来，通过收购、运营和创新，伯克希尔的浮存金增长了8,000倍。虽然在我们的财务报表中没有得到确认，但这笔浮存金对伯克希尔来说是一笔了不起的资产。"
    source_page: "concepts/保险浮存金"
    type: "web-quote"
    extraction_source: "website"
    tags: ["保险浮存金", "保险"]
    attribution: "2022 巴菲特致股东信"
    source_letter_year: 2022
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-保险浮存金-05"
    text: |
      "从1967年以860万美元收购国民保险公司开始，伯克希尔已经成为保险'浮存金'领域的世界领导者
    source_page: "concepts/保险浮存金"
    type: "web-quote"
    extraction_source: "website"
    tags: ["保险浮存金", "保险"]
    attribution: "浮存金是我们持有并可以用于投资、但并不属于我们的资金。伯克希尔的浮存金总额已从我们进入保险业时的1,900万美元增长到了1,470亿美元。\"——2021 巴菲特致股东信"
    source_letter_year: 2021
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-保险浮存金-06"
    text: |
      "保险公司先收保费，后付赔款。在一些极端情况下，比如某些工伤赔偿事故，赔付可以延续数十年之久。这种'先收后付'的模式让我们持有大笔资金
    source_page: "concepts/保险浮存金"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["保险浮存金", "保险"]
    attribution: "2009 巴菲特致股东信"
    source_letter_year: 2009
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-债券-01"
    text: |
      "在当前收益率水平下长期持有现金等价物或长期政府债券，几乎可以肯定是一种糟糕的策略。"
    source_page: "concepts/债券"
    type: "web-quote"
    extraction_source: "website"
    tags: ["债券", "固定收益"]
    attribution: "2008 巴菲特致股东信"
    source_letter_year: 2008
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-债券-02"
    text: |
      "有的债券是40年后到期的，但是发行人有权在5或10年后以微小的溢价赎回，怎么能有人买这样的债券呢？"
    source_page: "concepts/债券"
    type: "web-quote"
    extraction_source: "website"
    tags: ["债券", "固定收益"]
    attribution: "1970年2月 巴菲特致合伙人信"

  - id: "web-concepts-债券-03"
    text: |
      "2002年，垃圾债券变得非常便宜，我们买入了约80亿美元。但钟摆摆动得很快，如今这个板块在我们看来明显不再有吸引力了。昨日的野草如今被当作鲜花来定价。"
    source_page: "concepts/债券"
    type: "web-quote"
    extraction_source: "website"
    tags: ["债券", "固定收益"]
    attribution: "2003 巴菲特致股东信"
    source_letter_year: 2003
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-债券-04"
    text: |
      "我研究债券的方法和研究股票差不多。有看不懂的，就跳过去。一个机会，我看不懂，就跳过去，就算别人很高明，能分析明白，而且能赚大钱，我也不在意。"
    source_page: "concepts/债券"
    type: "web-quote"
    extraction_source: "website"
    tags: ["债券", "固定收益"]
    attribution: "1970年2月 巴菲特致合伙人信"

  - id: "web-concepts-公司治理-01"
    text: |
      "在判断美国企业界是否真心在进行改革时，CEO薪酬依然是最关键的试金石。"
    source_page: "concepts/公司治理"
    type: "web-quote"
    extraction_source: "website"
    tags: ["公司治理", "管理"]
    attribution: "2003 巴菲特致股东信"
    source_letter_year: 2003
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-公司治理-02"
    text: |
      "除了独立性之外，董事还应该具备商业头脑、股东导向意识，以及对公司的真正关心。在这些品质中，商业头脑最为稀缺
    source_page: "concepts/公司治理"
    type: "web-quote"
    extraction_source: "website"
    tags: ["公司治理", "管理"]
    attribution: "而如果缺了这一条，其他两条也无济于事。\""
    source_letter_year: 2003
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-公司治理-03"
    text: |
      "我们董事的底线是：你们赢，他们大赢；你们输，他们大输。我们的这套做法或许可以称为'所有者资本主义'。"
    source_page: "concepts/公司治理"
    type: "web-quote"
    extraction_source: "website"
    tags: ["公司治理", "管理"]
    attribution: "2003 巴菲特致股东信"
    source_letter_year: 2003
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-公司治理-04"
    text: |
      "CEO们完全明白这道数学题，他们知道每派出一分钱的红利，所有已发行期权的价值就减少一分。但我从来没有在股东委托书材料中，看到过对这种管理层与股东利益冲突的说明。"
    source_page: "concepts/公司治理"
    type: "web-quote"
    extraction_source: "website"
    tags: ["公司治理", "管理"]
    attribution: "2005 巴菲特致股东信"
    source_letter_year: 2005
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-内在价值-01"
    text: |
      "真正重要的是内在价值
    source_page: "concepts/内在价值"
    type: "web-quote"
    extraction_source: "website"
    tags: ["内在价值", "估值"]
    attribution: "这个数字代表我们旗下所有业务合理价值的总和。如果有完美的远见，这个数字可以通过对企业未来所有的现金流（流入和流出）按现行利率折现来计算。\""
    source_letter_year: 1989
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-内在价值-02"
    text: |
      "账面价值是一个会计概念，衡量的是一家企业投入的资本，包括留存收益在内。内在价值则是对一家企业在其剩余寿命中所能产出的现金流的折现估计值。对大多数公司而言，这两个数字并没有什么关系。"
    source_page: "concepts/内在价值"
    type: "web-quote"
    extraction_source: "website"
    tags: ["内在价值", "估值"]
    attribution: "1993 巴菲特致股东信"
    source_letter_year: 1993
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-内在价值-03"
    text: |
      "今天任何一只股票、债券或一家企业的价值，取决于在其剩余存续期间预期发生的现金流入和流出
    source_page: "concepts/内在价值"
    type: "web-quote"
    extraction_source: "website"
