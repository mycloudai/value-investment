  - id: "local-partnership-letters-1963-md-02"
    text: |
      **低估类（Generals）**——这类投资是低估的股票，判断标准以定量分析为主，但定性因素同样受到高度重视。通常来说，这类投资几乎看不出近期股价上涨的具体催化剂。这些股票既不光鲜，也没有市场追捧。它们唯一的优势就是价格低廉——通过审慎分析可以看出，公司的市值远低于产业资本对其的合理估值。我再次强调：定量分析是第一位的、是根本，但定性同样重要。我们喜欢优秀的管理层，喜欢有前途的行业，也希望看到某种"催化剂"能打破原本死气沉沉的管理层或股东群体的惰性——但归根结底，我们要买得值。低估类与道指的走势高度同步：道指大幅下跌时，低估类也会跟着大跌；反之，在市场强劲上行的年份，低估类应该表现最为出色。长期来看，我们期望它能帮助我们实现领先道指的目标。 **套利类（Workouts）**——这类投资是有时间表可循的。机会来自各类公司行动——出售、并购、重组、分拆等等。我们做这类投资，不依赖传闻或"内幕消息"，只看公司的公开公告。在报纸上白纸黑字读到了，我们才会出手。套利类投资有时也会受大盘影响，但主要风险不是市场涨跌，而是中途出现意外导致预期进展落空——常见的意外包括反垄断等政府干预、股东否决、税收政策限制等。许多套利投资的账面毛利看起来不高。一位朋友说，这是在别人已经赚了9角5分之后，再去捡最后那几分钱。但正因为确定性高、持有时间短，年化收益率算下来其实相当不错。套利类每年贡献的绝对利润比低估类更稳定。在市场下跌的年份，套利类积少成多，能帮我们积累起相当大的领先优势；在牛市中，它则会拖累我们的整体业绩。长期来看，我认为套利类能与低估类一样实现我们跑赢道指的目标。 **控制类（Controls）**——这类投资比较罕见，但一旦出手，规模往往不小。有的是一开始就通过大宗交易建立控制性持股；有的则是从低估类发展而来——某只低估股的价格在低位徘徊太久，让我们得以持续买入，最终取得部分或完全控股的地位，能够对公司施加影响。到了这个阶段，我们是主动介入还是保持相对被动，取决于我们对公司前景和管理层能力的判断。最近几个月，我们一直在大量买入一只低估类股票，这家公司管理层优秀、策略合理。如果我们持续买入后在某个时点实现了控股，我们大概率会保持非常被动的姿态，不会干预公司的日常经营。 我们不愿为了主动而主动。在其他条件相同的情况下，我更乐意放手让别人去干。不过，如果必须主动介入才能让资本得到最优配置，大家尽管放心——我们绝不会袖手旁观。 不论主动还是被动，控制类投资有一点是必须做到的：买入时就要把利润锁定在里面。这类投资的先决条件是一个有吸引力的买入价格。一旦取得控股权，我们投资价值的高低，就不再取决于市场那时常失去理智的报价，而是企业本身的价值。 我们有意愿、也有财力去取得控股地位，这使我们在低估类的很多持仓上都具备了进退自如的灵活性：如果市场回心转意，股价自然会上涨；如果市场仍然视而不见，我们就继续买入，直到公司成为我们的，届时评判我们判断正确与否的，是公司本身，而不是市场。 衡量控制类的投资回报，至少需要几年时间。按部就班地买入本身就需要时间，此后还可能需要改善管理层、重新配置资本、推动出售或并购等——这一切都决定了控制类投资必须以年而非月来度量。也正因如此，在控制类投资中，我们要求利润空间必须足够大；如果看起来空间有限，我们就直接放弃。 在买入阶段，控制类的走势与道指基本同步；进入后期阶段，其表现则更接近套利类。
    source_page: "partnership-letters/1963.md"
    type: "blockquote"
    extraction_source: "local-md"
    tags: ["1963", "信件"]
