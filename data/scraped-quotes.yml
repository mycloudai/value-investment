  - id: "local-partnership-letters-1969-may-md-01"
    text: |
      1. 最重要的一件事是，有许多合伙人不想自己打理资产，我要为他们推荐一个资产管理的途径。有些合伙人自己就有很多选择，他们对自己的选择很自信、也很放心。但是，有些合伙人则不然，我不能就把钱还给他们，说声“好运”，就完了。我打算向他们推荐另外一位资产管理人。无论是我的亲戚，还是我一生要为其提供投资建议的其他人，我都会放心的把他们的资金交给这个人管理。他人品和能力都很好，他将来的业绩可能和我继续做下去差不多（但肯定不如他或者我过去取得的业绩）。我们的任何合伙人都可以投资给他，没有账户最低金额的限制。将来，我会和他保持一定的联系，对他的投资情况有个大概了解，但只是偶尔关注，而且我提建议的话，基本上也只限于否定意见。 2. 我希望所有合伙人都可以自由选择，愿意获得现金的可以获得现金，愿意获得有价证券的可以获得有价证券。有价证券中应该只有一只是可以随时卖出变现的。这些股票的前景和价格，是我都非常看好的，但是合伙人可以自由选择是否将有价证券变成现金。 3. 我也希望所有合伙人能有这个选择，即按权益比例相应获得我们的两家控股公司（多元零售公司和伯克希尔哈撒韦公司）和一家规模较小的“受限制的”公司的股份。因为这些股票的公允价值完全是我估算的，所以我认为一定要给各位这个选择权，如果愿意的话，各位可以根据我的估值，按权益比例获得控股公司的相应股份。 - 但是，这些股票并不能在市场上自由买卖（SEC 对控股股东的股票和未注册上市的股票有各种限制规定），而且在很长时间里可能也不能转让、不能带来收入。在清算过程中，我希望给各位提供自由选择权：留下受限制的股票或获得等价的现金。我特别欣赏我们的控股公司的经营者（我们又多了两个新成员：伊利诺伊国民银行 (Illinois National Bank) 和罗克福德信托公司 (Trust Company of Rockford)。伊利诺伊国民银行是一家资产规模在 1 亿美元以上、经营特别出色的银行，是伯克希尔哈撒韦今年年初收购的），希望和他们的关系可以地久天长。控股公司有我欣赏和敬佩的经营者，就算别人出价再高，我都无意出售。但是，在特定情况下，可能会出售控股公司下面的某个业务部门。
    source_page: "partnership-letters/1969-may.md"
    type: "blockquote"
    extraction_source: "local-md"
