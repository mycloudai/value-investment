    type: "web-blockquote"
    extraction_source: "website"
    tags: ["商誉", "会计"]

  - id: "web-concepts-商誉-07"
    text: |
      "消费者特许经营权是经济商誉的首要来源。其他来源包括不受利润管制的政府特许经营权（如电视台），以及在某个行业中持久的低成本生产者地位。"
    source_page: "concepts/商誉"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["商誉", "会计"]

  - id: "web-concepts-商誉-08"
    text: |
      "1. 在分析经营成果时——即评估一个业务单元的内在经济效益时——摊销费用应当被忽略。一家企业在无杠杆的净有形资产上预期能赚取多少（不扣除任何商誉摊销费用），是衡量该业务经济吸引力的最佳指南。"
      "2. 在评估企业收购是否明智时，摊销费用同样应当被忽略。摊销费用既不应从利润中扣除，也不应从企业的成本中扣除。这意味着应当永远以全部成本来看待所购买的商誉——不做任何摊销。"
    source_page: "concepts/商誉"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["商誉", "会计"]

  - id: "web-concepts-商誉-09"
    text: |
      "在通胀年代积累起来的大量商业财富，不成比例地来自那些将持久无形资产与对有形资产的相对较低需求结合在一起的企业。在这类企业中，名义美元利润大幅攀升，而这些美元又大部分可用于收购更多的企业。"
    source_page: "concepts/商誉"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["商誉", "会计"]

  - id: "web-concepts-商誉-10"
    text: |
      "考虑到创建这个账户时管理层缺乏的自制力，在这种情况下或许该叫它'无商誉'更合适。不管叫什么名字，通常照样走40年的摊销仪式，管理层那股被资本化的肾上腺素继续作为一项'资产'留在账上——就好像这笔收购是明智之举一样。"
    source_page: "concepts/商誉"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["商誉", "会计"]

  - id: "web-concepts-商誉-11"
    text: |
      "1993年买下德克斯特时我付的价格显然是个错误。更糟糕的是，我还以伯克希尔股份作为支付手段，将这个错误放大了许多倍。去年，为了正视这个错误，我们将当初收购德克斯特时产生的所有剩余商誉一次性注销了。"
    source_page: "concepts/商誉"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["商誉", "会计"]

  - id: "web-concepts-商誉-12"
    text: |
      "部分抵消这一高估负债的，是归属于我们保险公司的155亿美元'商誉'资产。实际上，这笔商誉代表的是我们为保险业务创造浮存金的能力所支付的价格。然而，商誉的成本与其真实价值没有任何关系。如果一家保险公司持续发生大额承保亏损，不管原始成本是多少，归属于它的任何商誉资产都应视为毫无价值。"
    source_page: "concepts/商誉"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["商誉", "会计"]

  - id: "web-concepts-回购-01"
    text: |
      "在被投资公司使用留存收益的各种方式中，有一种经常让我们格外兴奋，那就是回购自家股票。道理很简单：如果一家优秀的企业在市场上以远低于内在价值的价格出售，那还有什么比以这种便宜价格大幅扩大全体股东权益更确定、更有利可图的资本运用呢？"
    source_page: "concepts/回购"
    type: "web-quote"
    extraction_source: "website"
    tags: ["回购", "股东回报"]
    attribution: "1980 巴菲特致股东信"
    source_letter_year: 1980
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-回购-02"
    text: |
      "仅仅说回购是为了抵消股票增发带来的稀释，或者仅仅因为公司有多余的现金，都是站不住脚的。除非以低于内在价值的价格回购，否则继续持股的股东就是在受损害。资本配置的第一定律
    source_page: "concepts/回购"
    type: "web-quote"
    extraction_source: "website"
    tags: ["回购", "股东回报"]
    attribution: "不管资金是用来收购企业还是回购股票——就是在一个价格上聪明的做法，在另一个价格上就是愚蠢的。\"——2011 巴菲特致股东信"
    source_letter_year: 2011
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-回购-03"
    text: |
      "在投资界，关于股票回购的讨论往往火药味十足。但我建议这场辩论的参与者们先深吸一口气：评估回购是否可取，并没有那么复杂。"
    source_page: "concepts/回购"
    type: "web-quote"
    extraction_source: "website"
    tags: ["回购", "股东回报"]
    attribution: "2016 巴菲特致股东信"
    source_letter_year: 2016
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-回购-04"
    text: |
      "理解内在价值，对经营者来说与对投资者一样重要。当经理人做资本配置决策时
    source_page: "concepts/回购"
    type: "web-quote"
    extraction_source: "website"
    tags: ["回购", "股东回报"]
    attribution: "包括是否回购股份——至关重要的是必须增加每股内在价值，避免使之减损。\"——1994 巴菲特致股东信"
    source_letter_year: 1994
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-回购-05"
    text: |
      "2022年，通过伯克希尔自身的股票回购以及苹果和美国运通的类似举措，每股内在价值获得了非常小的增长。在伯克希尔这边，我们通过回购公司1.2%的流通股，直接增加了各位在我们独特企业组合中的权益。"
    source_page: "concepts/回购"
    type: "web-quote"
    extraction_source: "website"
    tags: ["回购", "股东回报"]
    attribution: "2022 巴菲特致股东信"
    source_letter_year: 2022
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-回购-06"
    text: |
      "资本配置的第一定律
    source_page: "concepts/回购"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["回购", "股东回报"]
    attribution: "2011 巴菲特致股东信"
    source_letter_year: 2011
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-回购-07"
    text: |
      "如果一家优秀的企业在市场上以远低于内在价值的价格出售，那还有什么比以这种便宜价格大幅扩大全体股东权益更确定、更有利可图的资本运用呢？公司并购的竞争本质几乎注定了在整体收购另一家企业时，必须支付全价
    source_page: "concepts/回购"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["回购", "股东回报"]
    attribution: "1980 巴菲特致股东信"
    source_letter_year: 1980
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-回购-08"
    text: |
      "此外，通过伯克希尔，你们还持有多家不断回购自家股票的公司的大量股权。股价越低，这些回购计划给我们带来的好处就越大：当股价低迷时，被投资公司用同样一笔钱回购的股份更多，间接提升了我们的持股比例。"
    source_page: "concepts/回购"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["回购", "股东回报"]
    attribution: "1997 巴菲特致股东信"
    source_letter_year: 1997
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-复利-01"
    text: |
      "收益再投资加上复利的力量产生了奇妙的效果，股东们变得富有。"
    source_page: "concepts/复利"
    type: "web-quote"
    extraction_source: "website"
    tags: ["复利", "长期投资"]
    attribution: "2021 巴菲特致股东信"
    source_letter_year: 2021
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-复利-02"
    text: |
      "就这样开始了我们通往2023年的旅程。这是一条颠簸的路，一路上汇聚了几重因素：我们股东持续的储蓄（也就是利润的留存再投资），复利的力量，对重大失误的规避
    source_page: "concepts/复利"
    type: "web-quote"
    extraction_source: "website"
    tags: ["复利", "长期投资"]
    attribution: "以及最重要的——美国顺风。\""
    source_letter_year: 2022
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-复利-03"
    text: |
      "永远不要冒永久性资本损失的风险。感谢美国的顺风和复利的力量，如果你这一辈子做了几个好决定、避开了严重的错误，我们所处的这个竞技场过去是
    source_page: "concepts/复利"
    type: "web-quote"
    extraction_source: "website"
    tags: ["复利", "长期投资"]
    attribution: "将来也是——回报丰厚的。\""
    source_letter_year: 2023
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-复利-04"
    text: |
      "以非常微小的方式，伯克希尔股东也参与了这个美国奇迹
    source_page: "concepts/复利"
    type: "web-quote"
    extraction_source: "website"
    tags: ["复利", "长期投资"]
    attribution: "通过放弃分红，选择再投资而非消费。最初，这种再投资规模极小，几乎微不足道，但随着时间推移呈爆发式增长，体现了持续储蓄文化与长期复利魔力的完美结合。\""
    source_letter_year: 2024
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-复利-05"
    text: |
      "大多数公司习惯把每股收益创新高称为'创纪录'的业绩。但由于企业每年都在不断增加股本基础，所以我们觉得这并没什么值得大书特书的
    source_page: "concepts/复利"
    type: "web-quote"
    extraction_source: "website"
    tags: ["复利", "长期投资"]
    attribution: "比方说，股本增加了10%而每股收益只增长了5%。毕竟，一个完全不动的定期存款账户，靠着复利每年也能稳定产生越来越多的利息收入。\""
    source_letter_year: 1977
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-复利-06"
    text: "1965年初，一切开始改变。伯克希尔迎来了新的管理层，重新配置了可用资金，基本上把所有收益都投入到了各种好生意中，其中大部分在此后多年一直保持优秀。收益再投资加上复利的力量产生了奇妙的效果，股东们变得富有。"
    source_page: "concepts/复利"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["复利", "长期投资"]

  - id: "web-concepts-复利-07"
    text: "现任管理层19年任期内，账面价值从每股19.46美元增长到975.83美元，年复合增长率约22.6%。考虑到我们目前的规模，这样的回报率是不可能持续的。不信的人适合去做销售，但千万别去搞数学。"
    source_page: "concepts/复利"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["复利", "长期投资"]

  - id: "web-concepts-复利-08"
    text: "就这样开始了我们通往2023年的旅程。这是一条颠簸的路，一路上汇聚了几重因素：我们股东持续的储蓄（也就是利润的留存再投资），复利的力量，对重大失误的规避——以及最重要的——美国顺风。没有伯克希尔，美国照样行；反过来可不成。"
    source_page: "concepts/复利"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["复利", "长期投资"]

  - id: "web-concepts-复利-09"
    text: "给投资者的启示是：花儿盛开之时，杂草的分量自然就不值一提了。假以时日，只需要几个赢家就能创造奇迹。当然了，早点起步、活到90多岁也有帮助。"
    source_page: "concepts/复利"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["复利", "长期投资"]

  - id: "web-concepts-套利-01"
    text: |
      "套利类投资有时间表可循。套利投资机会出现在出售、并购、重组、分拆等公司活动中。我们做套利投资不听传闻或'内幕消息'，只看公司的公告。"
    source_page: "concepts/套利"
    type: "web-quote"
    extraction_source: "website"
    tags: ["套利", "投资策略"]
    attribution: "1967 巴菲特致合伙人信"
    source_letter_year: 1967
    source_letter_category: "partnership-letter"

  - id: "web-concepts-套利-02"
    text: |
      "评估一项套利机会时，你必须回答四个问题：(1) 已宣布的事件确实发生的可能性有多大？(2) 你的资金会被占用多久？(3) 出现更好结果的概率有多大？(4) 如果事件未能发生，将会怎样？"
    source_page: "concepts/套利"
    type: "web-quote"
    extraction_source: "website"
    tags: ["套利", "投资策略"]
    attribution: "1988 巴菲特致股东信"
    source_letter_year: 1988
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-套利-03"
    text: |
      "伯克希尔的套利操作与许多套利客有几个不同之处。首先，每年我们只参与少数
    source_page: "concepts/套利"
    type: "web-quote"
    extraction_source: "website"
    tags: ["套利", "投资策略"]
    attribution: "通常是大型的——交易。致富了却整天盯着行情屏幕，这有什么意义？\""
    source_letter_year: 1988
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-套利-04"
    text: |
      "一个投资者不可能仅靠锁定某个特定的投资类别或风格就获得超额回报。他只有通过仔细评估事实并持续遵守纪律才能做到。"
    source_page: "concepts/套利"
    type: "web-quote"
    extraction_source: "website"
    tags: ["套利", "投资策略"]
    attribution: "1988 巴菲特致股东信"
    source_letter_year: 1988
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-套利-05"
    text: |
      "套利类投资有时间表可循。套利投资机会出现在出售、并购、重组、分拆等公司活动中。我们做套利投资不听传闻或'内幕消息'，只看公司的公告。在白纸黑字上读到了，我们才会出手。"
    source_page: "concepts/套利"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["套利", "投资策略"]
    attribution: "1967 巴菲特致合伙人信"
    source_letter_year: 1967
    source_letter_category: "partnership-letter"

  - id: "web-concepts-媒体与出版-01"
    text: |
      "报纸、电视和杂志产业在经济特征上已经越来越像普通企业，而不是拥有特许经营权的事业。"
    source_page: "concepts/媒体与出版"
    type: "web-quote"
    extraction_source: "website"
    tags: ["媒体", "行业"]
    attribution: "1991 巴菲特致股东信"
    source_letter_year: 1991
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-媒体与出版-02"
    text: |
      "拥有喜诗让我们学到了很多关于如何评估特许经营权的知识。我们在某些股票投资上赚到了可观的收益，正是因为在喜诗身上学到的这些功课。"
    source_page: "concepts/媒体与出版"
    type: "web-quote"
    extraction_source: "website"
    tags: ["媒体", "行业"]
    attribution: "1991 巴菲特致股东信"
    source_letter_year: 1991
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-安全边际-01"
    text: |
      "我们坚持在买入价格上留有安全边际。如果我们计算出一只普通股的价值仅仅略高于其价格，我们就不会感兴趣。我们相信恩师本杰明·格雷厄姆极力强调的安全边际原则，是投资成功最关键的基石。"
    source_page: "concepts/安全边际"
    type: "web-quote"
    extraction_source: "website"
    tags: ["安全边际", "风险管理"]
    attribution: "1992 巴菲特致股东信"
    source_letter_year: 1992
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-安全边际-04"
    text: |
      "今天的价格水平已经大幅侵蚀了本杰明·格雷厄姆所说的'安全边际'
    source_page: "concepts/安全边际"
    type: "web-quote"
    extraction_source: "website"
    tags: ["安全边际", "风险管理"]
    attribution: "他视之为智慧投资的基石。\""
    source_letter_year: 1997
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-安全边际-05"
    text: |
      "保费定价必须留出充足的安全边际，以应对那些永远会给保险业带来昂贵意外的社会趋势。即便将目标设在100，本身就可能导致巨额亏损；瞄准110到115则无异于自杀。"
    source_page: "concepts/安全边际"
    type: "web-quote"
    extraction_source: "website"
    tags: ["安全边际", "风险管理"]
    attribution: "1990 巴菲特致股东信"
    source_letter_year: 1990
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-市场先生-01"
    text: |
      "本杰明·格雷厄姆，我的老师也是我的朋友，很久以前描述过一种面对市场波动的心态，我认为这是对投资成功最有帮助的一番话。"
    source_page: "concepts/市场先生"
    type: "web-quote"
    extraction_source: "website"
    tags: ["市场先生", "市场波动"]
    attribution: "1987 巴菲特致股东信"
    source_letter_year: 1987
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-市场先生-02"
    text: |
      "市场先生是来为你服务的，不是来引导你的。对你有用的是他的钱包，而不是他的智慧。如果某天他以一种格外愚蠢的姿态出现，你可以选择无视他，也可以好好利用他，但如果你受了他的影响，那就是灾难。"
    source_page: "concepts/市场先生"
    type: "web-quote"
    extraction_source: "website"
    tags: ["市场先生", "市场波动"]
    attribution: "1987 巴菲特致股东信"
    source_letter_year: 1987
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-市场先生-03"
    text: |
      "市场先生还有一个讨人喜欢的特点：他不在乎被人冷落。如果他今天的报价你不感兴趣，明天他还会带着新的报价登门。交易完全由你说了算。在这种条件下，他的行为越躁狂，对你就越有利。"
    source_page: "concepts/市场先生"
    type: "web-quote"
    extraction_source: "website"
    tags: ["市场先生", "市场波动"]
    attribution: "1987 巴菲特致股东信"
    source_letter_year: 1987
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-市场先生-04"
    text: |
      "追随格雷厄姆的教诲，查理和我让我们持有的股票用其经营成果
    source_page: "concepts/市场先生"
    type: "web-quote"
    extraction_source: "website"
    tags: ["市场先生", "市场波动"]
    attribution: "而不是每天甚至每年的价格波动——来告诉我们投资是否成功。市场可能会暂时忽视一家企业的成功，但最终必会予以认可。正如格雷厄姆所说：'短期来看，市场是一台投票机；长期来看，它是一台称重机。'\""
    source_letter_year: 1987
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-市场先生-05"
    text: |
      "这位老兄越是喜怒无常，投资者的机会就越多。道理很简单：市场剧烈波动意味着好公司时不时会出现不合理的低价。很难想象，为什么这种低价的出现会被视为增加了投资者的风险
    source_page: "concepts/市场先生"
    type: "web-quote"
    extraction_source: "website"
    tags: ["市场先生", "市场波动"]
    attribution: "只要他完全可以无视市场或者利用市场的愚蠢。\""
    source_letter_year: 1993
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-市场先生-06"
    text: |
      但是，就像舞会上的灰姑娘一样，你必须牢记一个警告，否则一切都会变回南瓜和老鼠：市场先生是来为你服务的，不是来引导你的。对你有用的是他的钱包，而不是他的智慧。如果某天他以一种格外愚蠢的姿态出现，你可以选择无视他，也可以好好利用他，但如果你受了他的影响，那就是灾难。
    source_page: "concepts/市场先生"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["市场先生", "市场波动"]

  - id: "web-concepts-市场先生-07"
    text: |
      事实上，真正的投资者欢迎波动还来不及呢。本杰明·格雷厄姆在《聪明的投资者》第八章做过解释。他在书中介绍了"市场先生"——一个殷勤的家伙，每天都会出现在你面前，随时愿意买你的股票或卖给你，任君选择。这位老兄越是喜怒无常，投资者的机会就越多。道理很简单：市场剧烈波动意味着好公司时不时会出现不合理的低价。很难想象，为什么这种低价的出现会被视为增加了投资者的风险。
    source_page: "concepts/市场先生"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["市场先生", "市场波动"]

  - id: "web-concepts-市场先生-08"
    text: "市场先生还有一个讨人喜欢的特点：他不在乎被人冷落。如果他今天的报价你不感兴趣，明天他还会带着新的报价登门。交易完全由你说了算。在这种条件下，他的行为越躁狂，对你就越有利。"
    source_page: "concepts/市场先生"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["市场先生", "市场波动"]

  - id: "web-concepts-市场预测-01"
    text: |
      "我不做预测股市涨跌或经济波动的事。如果你认为我能预测，或者觉得不预测就没法投资，那合伙基金不适合你。"
    source_page: "concepts/市场预测"
    type: "web-quote"
    extraction_source: "website"
    tags: ["市场预测", "投资心理"]
    attribution: "1962 巴菲特致合伙人信"
    source_letter_year: 1962
    source_letter_category: "partnership-letter"

  - id: "web-concepts-市场预测-02"
    text: |
      "市场预测专家只能灌满你的耳朵，却永远灌不满你的钱包。"
    source_page: "concepts/市场预测"
    type: "web-quote"
    extraction_source: "website"
    tags: ["市场预测", "投资心理"]
    attribution: "2014 巴菲特致股东信"
    source_letter_year: 2014
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-市场预测-03"
    text: |
      "自己拍脑袋做宏观判断，或者听别人的宏观和市场预测，都是浪费时间。实际上这还很危险，因为它可能模糊你对真正重要的事实的判断。"
    source_page: "concepts/市场预测"
    type: "web-quote"
    extraction_source: "website"
    tags: ["市场预测", "投资心理"]
    attribution: "2013 巴菲特致股东信"
    source_letter_year: 2013
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-市场预测-04"
    text: |
      "我们对市场短期或中期的走向没有任何想法
    source_page: "concepts/市场预测"
    type: "web-quote"
    extraction_source: "website"
    tags: ["市场预测", "投资心理"]
    attribution: "从来都没有过。\""
    source_letter_year: 1986
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-市场预测-07"
    text: |
      "自己拍脑袋做宏观判断，或者听别人的宏观和市场预测，都是浪费时间。实际上这还很危险，因为它可能模糊你对真正重要的事实的判断。（每当我听到电视评论员口若悬河地预测市场下一步走势时，就会想起米奇·曼特尔那句一针见血的评论：'你不坐到解说席上去，都不知道这比赛原来这么简单。'）"
    source_page: "concepts/市场预测"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["市场预测", "投资心理"]
    attribution: "2013 巴菲特致股东信"
    source_letter_year: 2013
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-市场预测-08"
    text: |
      "如果1,000位经理人在年初做市场预测，至少有一位的预测很可能连续九年都是正确的。当然，1,000只猴子中也同样可能出现一只看似无所不知的'先知'。但两者之间有一个区别：那只幸运的猴子不会发现有人排队来找它投资。"
    source_page: "concepts/市场预测"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["市场预测", "投资心理"]
    attribution: "2016 巴菲特致股东信"
    source_letter_year: 2016
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-市场预测-09"
    text: |
      "被误导的读者或观众很可能认为查理和我在预测股市会走坏，而事实上我们不仅在那句话里、还在其他地方都清楚地表明，我们根本没有在预测市场。任何被这些哗众取宠的报道所误导的投资者都付出了沉重代价：这封信公布当天道琼斯指数收于7,063点，而年底收于10,428点。"
    source_page: "concepts/市场预测"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["市场预测", "投资心理"]
    attribution: "2009 巴菲特致股东信"
    source_letter_year: 2009
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-市场预测-10"
    text: |
      "虽然我们从不试图预测股市的走势，但我们确实会以一种非常粗略的方式来评估股市的合理价值。"
    source_page: "concepts/市场预测"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["市场预测", "投资心理"]
    attribution: "1997 巴菲特致股东信"
    source_letter_year: 1997
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-市场预测-11"
    text: |
      "投资者的工具箱里没有位置：市场上任何事都可能在任何时候发生。没有任何顾问、经济学家或电视评论员——当然也包括查理和我——能告诉你混乱什么时候会发生。市场预测专家只能灌满你的耳朵，却永远灌不满你的钱包。"
    source_page: "concepts/市场预测"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["市场预测", "投资心理"]
    attribution: "2014 巴菲特致股东信"
    source_letter_year: 2014
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-市场预测-12"
    text: |
      "既然我不知道有什么办法能可靠地预测市场走势，我建议你们只在打算持有至少五年的前提下购买伯克希尔股票。那些追求短期利润的人应该去别处看看。"
    source_page: "concepts/市场预测"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["市场预测", "投资心理"]
    attribution: "2014 伯克希尔的过去现在与未来"
    source_letter_year: 2014
    source_letter_category: "special-letter"

  - id: "web-concepts-市盈率-01"
    text: |
      "常见的估值指标如股息率、市盈率、市净率，甚至增长率，本身与估值毫无关系
    source_page: "concepts/市盈率"
    type: "web-quote"
    extraction_source: "website"
    tags: ["市盈率", "估值"]
    attribution: "除非它们能为一家企业未来现金流入和流出的金额及时间提供线索。\"——2000 巴菲特致股东信"
    source_letter_year: 2000
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-市盈率-02"
    text: |
      "即使这些特征（低市净率、低市盈率、高股息率）全部同时具备，也远不能保证投资者确实是在以物有所值的价格买入。"
    source_page: "concepts/市盈率"
    type: "web-quote"
    extraction_source: "website"
    tags: ["市盈率", "估值"]
    attribution: "1992 巴菲特致股东信"
    source_letter_year: 1992
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-市盈率-03"
    text: |
      "猜测贪婪善变的大众会给企业盈利贴上多高的估值倍数，根本谈不上保守。"
    source_page: "concepts/市盈率"
    type: "web-quote"
    extraction_source: "website"
    tags: ["市盈率", "估值"]
    attribution: "1961 巴菲特致合伙人信"
    source_letter_year: 1961
    source_letter_category: "partnership-letter"

  - id: "web-concepts-市盈率-04"
    text: |
      "有时候，股票估值不仅仅是市盈率那么简单。"
    source_page: "concepts/市盈率"
    type: "web-quote"
    extraction_source: "website"
    tags: ["市盈率", "估值"]
    attribution: "1988 巴菲特致股东信"
    source_letter_year: 1988
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-市盈率-05"
    text: |
      "大多数投资者往往把最高的市盈率给了那些名头响亮、许诺翻天覆地变化的公司。这种美好的前景让投资者可以尽情幻想未来的丰厚利润，而不必面对眼前的经营现实。"
    source_page: "concepts/市盈率"
    type: "web-quote"
    extraction_source: "website"
    tags: ["市盈率", "估值"]
    attribution: "1987 巴菲特致股东信"
    source_letter_year: 1987
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-市盈率-06"
    text: "很多人几乎不看市盈率、股息率，就冲进蓝筹股，以为这样很保守。猜测贪婪善变的大众会给企业盈利贴上多高的估值倍数，根本谈不上保守。"
    source_page: "concepts/市盈率"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["市盈率", "估值"]
    attribution: "1961 巴菲特致合伙人信"
    source_letter_year: 1961
    source_letter_category: "partnership-letter"

  - id: "web-concepts-市盈率-07"
    text: "常见的估值指标如股息率、市盈率、市净率，甚至增长率，本身与估值毫无关系"
    source_page: "concepts/市盈率"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["市盈率", "估值"]
    attribution: "2000 巴菲特致股东信"
    source_letter_year: 2000
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-市盈率-08"
    text: |
      不管钱是从媒体公司赚来的还是从钢铁厂赚来的，一块钱就是一块钱。过去买家之所以愿意对媒体的一块钱盈利给予远高于钢铁的估值，是因为大家预期媒体的收益会持续增长（而且企业不需要多少额外资本），而钢铁的收益显然属于"打摆子"那一类。
    source_page: "concepts/市盈率"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["市盈率", "估值"]
    attribution: "1991 巴菲特致股东信"
    source_letter_year: 1991
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-市盈率-09"
    text: "大多数投资者的想法恰恰相反。他们往往把最高的市盈率给了那些名头响亮、许诺翻天覆地变化的公司。这种美好的前景让投资者可以尽情幻想未来的丰厚利润，而不必面对眼前的经营现实。"
    source_page: "concepts/市盈率"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["市盈率", "估值"]
    attribution: "1987 巴菲特致股东信"
    source_letter_year: 1987
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-市盈率-10"
    text: "1953年我第一次买进IDS的股票，当时它增长迅速，市盈率却只有3倍。（那个年代低垂的果子遍地都是。）"
    source_page: "concepts/市盈率"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["市盈率", "估值"]
    attribution: "1994 巴菲特致股东信"
    source_letter_year: 1994
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-市盈率-11"
    text: |
      "价值投资"通常意味着买入具有某些特征的股票，比如低市净率、低市盈率或高股息率。遗憾的是，即使这些特征全部同时具备，也远不能保证投资者确实是在以物有所值的价格买入。相应地，反过来的特征
    source_page: "concepts/市盈率"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["市盈率", "估值"]
    attribution: "1992 巴菲特致股东信"
    source_letter_year: 1992
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-市盈率-12"
    text: |
      凭借个人魅力、大肆宣传或可疑的会计手法——往往三管齐下——这些管理者把一个新组建的企业集团的股价推到20倍市盈率之类的水平，然后以最快速度发行股票，去收购市盈率只有十倍上下的公司。他们立即对收购采用"权益合并法"会计处理，这样一来——被收购公司的业务一分钱都没变——每股收益自动增加了。——2014 伯克希尔的过去现在与未来
    source_page: "concepts/市盈率"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["市盈率", "估值"]
    source_letter_year: 2014
    source_letter_category: "special-letter"

  - id: "web-concepts-市盈率-13"
    text: "即使这些举措只带来了可怜的5%回报率，废物先生仍然能大丰收。具体来说"
    source_page: "concepts/市盈率"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["市盈率", "估值"]
    attribution: "2005 巴菲特致股东信"
    source_letter_year: 2005
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-承保纪律-01"
    text: |
      "自1941年公司创立以来，林沃特先生始终坚守'承保必须盈利'这一原则
    source_page: "concepts/承保纪律"
    type: "web-quote"
    extraction_source: "website"
    tags: ["承保纪律", "保险"]
    attribution: "业内人人挂在嘴边，真正做到的却寥寥无几。\""
    source_letter_year: 1969
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-承保纪律-02"
    text: |
      "我们非常钦佩国民保险的承保纪律
    source_page: "concepts/承保纪律"
    type: "web-quote"
    extraction_source: "website"
    tags: ["承保纪律", "保险"]
    attribution: "这一纪律由创始人杰克·林沃尔特从公司创立之初便植入其中——并且深知这种纪律一旦中断，恐怕永远也无法完全恢复。\""
    source_letter_year: 1980
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-承保纪律-03"
    text: |
      "在这个行业里，最要紧的是承保纪律。真正的赢家是那些始终坚守三条关键原则的公司。"
    source_page: "concepts/承保纪律"
    type: "web-quote"
    extraction_source: "website"
    tags: ["承保纪律", "保险"]
    attribution: "2001 巴菲特致股东信"
    source_letter_year: 2001
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-承保纪律-04"
    text: |
      "凭借严格的承保纪律，这些资金长期来看很有可能实现零成本。"
    source_page: "concepts/承保纪律"
    type: "web-quote"
    extraction_source: "website"
    tags: ["承保纪律", "保险"]
    attribution: "2022 巴菲特致股东信"
    source_letter_year: 2022
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-承保纪律-05"
    text: |
      "1. 他们只接受自己能够正确评估的风险（坚守在能力圈之内），并且在评估了所有相关因素——包括极端损失情形——之后，确认这些风险具有盈利预期。这些保险公司从不以市场份额为目标，当竞争对手以愚蠢的价格或条款抢夺业务时，他们乐得让出。
      2. 他们严格限制承接的业务，以确保不会因为单一事件或相关事件而遭受损失聚集，从而威胁到公司的偿付能力。他们不遗余力地搜寻那些看似无关的风险之间可能存在的关联。"
    source_page: "concepts/承保纪律"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["承保纪律", "保险"]
    attribution: "2001 巴菲特致股东信"
    source_letter_year: 2001
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-承保纪律-06"
    text: |
      "他们的就业和薪酬也不会受到影响。我们非常钦佩国民保险的承保纪律——这一纪律由创始人杰克·林沃尔特从公司创立之初便植入其中——并且深知这种纪律一旦中断，恐怕永远也无法完全恢复。"
    source_page: "concepts/承保纪律"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["承保纪律", "保险"]
    attribution: "1980 巴菲特致股东信"
    source_letter_year: 1980
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-承保纪律-07"
    text: |
      "保险集团连续第六年实现了承保盈利。这意味着我们585亿美元的保险'浮存金'——这些钱不属于我们，但由我们持有并为自己的利益进行投资——其成本低于零。事实上，2008年持有这笔浮存金反而给我们带来了28亿美元的收入。"
    source_page: "concepts/承保纪律"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["承保纪律", "保险"]
    attribution: "2008 巴菲特致股东信"
    source_letter_year: 2008
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-承保纪律-08"
    text: |
      "我们需要的不是更多的政治家，而是更少的玉米。过去两年里，保险业通过大量融资，已经大幅扩大了玉米的种植面积。由此产生的'丰收'——也就是保险承保能力的激增——对价格和利润的影响，跟农产品过剩自古以来的后果毫无二致。"
    source_page: "concepts/承保纪律"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["承保纪律", "保险"]
    attribution: "1986 巴菲特致股东信"
    source_letter_year: 1986
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-护城河-01"
    text: |
      "品牌的力量、产品的特质和分销体系的优势赋予了它们巨大的竞争优势，犹如一道宽阔的护城河保卫着它们的经济城堡。相比之下，普通企业每天都要在没有任何类似保护的情况下厮杀求生。"
    source_page: "concepts/护城河"
    type: "web-quote"
    extraction_source: "website"
    tags: ["护城河", "竞争优势"]
    attribution: "1993 巴菲特致股东信"
    source_letter_year: 1993
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-护城河-02"
    text: |
      "在商业的世界里，我寻找的是被坚不可摧的'护城河'保护着的经济城堡。"
    source_page: "concepts/护城河"
    type: "web-quote"
    extraction_source: "website"
    tags: ["护城河", "竞争优势"]
    attribution: "1995 巴菲特致股东信"
    source_letter_year: 1995
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-护城河-03"
    text: |
      "一家真正伟大的企业必须拥有一条持久的'护城河'，保护其投入资本获得丰厚回报。资本主义的竞争活力决定了，任何赚取高回报的商业'城堡'都会遭到竞争对手一波又一波的进攻。因此，一道难以逾越的屏障是企业持续成功的根本保障。"
    source_page: "concepts/护城河"
    type: "web-quote"
    extraction_source: "website"
    tags: ["护城河", "竞争优势"]
    attribution: "2007 巴菲特致股东信"
    source_letter_year: 2007
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-护城河-04"
    text: |
      "一条需要不断重建的护城河，最终等于没有护城河。"
    source_page: "concepts/护城河"
    type: "web-quote"
    extraction_source: "website"
    tags: ["护城河", "竞争优势"]
    attribution: "2007 巴菲特致股东信"
    source_letter_year: 2007
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-护城河-05"
    text: |
      "当短期和长期发生冲突时，加宽护城河必须优先。"
    source_page: "concepts/护城河"
    type: "web-quote"
    extraction_source: "website"
    tags: ["护城河", "竞争优势"]
    attribution: "2005 巴菲特致股东信"
    source_letter_year: 2005
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-收购-01"
    text: |
      "在伯克希尔，我们的收购策略简单至极：接电话就行。可喜的是，电话现在响得更勤了，因为越来越多的企业主和经理人希望把自己的公司加入伯克希尔。"
    source_page: "concepts/收购"
    type: "web-quote"
    extraction_source: "website"
    tags: ["收购", "资本配置"]
    attribution: "2000 巴菲特致股东信"
    source_letter_year: 2000
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-收购-02"
    text: |
      "不同于杠杆收购者和私募股权公司，我们没有'退出'策略
    source_page: "concepts/收购"
    type: "web-quote"
    extraction_source: "website"
    tags: ["收购", "资本配置"]
    attribution: "我们买了就不卖。\""
    source_letter_year: 2002
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-收购-03"
    text: |
      "如果你也在经营一家大型的、盈利丰厚的企业，并且觉得在类似盖可保险的环境中会如鱼得水，那就看看我们列出的收购标准，然后给我打个电话吧。我保证会很快答复。"
    source_page: "concepts/收购"
    type: "web-quote"
    extraction_source: "website"
    tags: ["收购", "资本配置"]
    attribution: "1998 巴菲特致股东信"
    source_letter_year: 1998
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-收购-04"
    text: |
      "我们必须坚守承诺；避免对收购来的企业加杠杆；赋予管理者非同寻常的自主权；无论顺境逆境都与被收购的企业同在。"
    source_page: "concepts/收购"
    type: "web-quote"
    extraction_source: "website"
    tags: ["收购", "资本配置"]
    attribution: "2008 巴菲特致股东信"
    source_letter_year: 2008
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-收购-05"
    text: |
      "(1) 有一定的规模（税后净利润至少500万美元）；
      (2) 表现出持续稳定的盈利能力（我们对未来预测不感兴趣，'困境反转'型企业也不是我们的菜）；
      (3) 企业在很少或没有负债的情况下取得了良好的股本回报率。"
    source_page: "concepts/收购"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["收购", "资本配置"]
    attribution: "1984 巴菲特致股东信"
    source_letter_year: 1984
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-收购-06"
    text: |
      "不同于杠杆收购者和私募股权公司，我们没有'退出'策略——我们买了就不卖。这也是为什么伯克希尔往往是卖方及其经理人的首选——有时甚至是唯一的选择。"
    source_page: "concepts/收购"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["收购", "资本配置"]
    attribution: "2002 巴菲特致股东信"
    source_letter_year: 2002
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-收购-07"
    text: |
      "6月21日，我收到了一份两页纸的传真，逐条说明了森林河为什么符合我们的收购标准。在此之前，我既没听说过这家年销售额16亿美元的休闲房车制造商，也不认识它的老板兼经理人皮特·利格尔。但传真说的很有道理，我立刻要求提供更多数据。第二天早上数据就到了，当天下午我就向Pete发出了要约。"
    source_page: "concepts/收购"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["收购", "资本配置"]
    attribution: "2005 巴菲特致股东信"
    source_letter_year: 2005
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-有效市场-01"
    text: |
      "他们正确地观察到市场经常是有效率的，便错误地推论出市场永远是有效率的。这两个命题之间的差别，简直如同黑夜与白昼。"
    source_page: "concepts/有效市场"
    type: "web-quote"
    extraction_source: "website"
    tags: ["有效市场", "学术理论"]
    attribution: "1988 巴菲特致股东信"
    source_letter_year: 1988
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-有效市场-02"
    text: |
      "各学院的教授们依然兴高采烈地宣讲有效市场理论，好像它跟圣经一样确凿无疑。一位胆敢质疑有效市场理论的财务学讲师，获得重大晋升的几率大概跟伽利略被提名为教宗差不多。"
    source_page: "concepts/有效市场"
    type: "web-quote"
    extraction_source: "website"
    tags: ["有效市场", "学术理论"]
    attribution: "2006 巴菲特致股东信"
    source_letter_year: 2006
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-有效市场-03"
    text: |
      "格雷厄姆学派或许应该捐建几个教授席位，以确保EMT在校园中千秋万代地传承下去。"
    source_page: "concepts/有效市场"
    type: "web-quote"
    extraction_source: "website"
    tags: ["有效市场", "学术理论"]
    attribution: "1988 巴菲特致股东信"
    source_letter_year: 1988
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-有效市场-04"
    text: |
      "地平说学会大概也会把轮船环球航行视为一个恼人但无关紧要的异常现象吧。"
    source_page: "concepts/有效市场"
    type: "web-quote"
    extraction_source: "website"
    tags: ["有效市场", "学术理论"]
    attribution: "2010 巴菲特致股东信"
    source_letter_year: 2010
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-有效市场-05"
    text: |
      "这一学说在1970年代变得极为时髦——在学术圈简直被奉为圣经。它的核心主张是，分析股票毫无用处，因为所有公开信息都已经恰当地反映在股价中了。换句话说，市场永远无所不知。作为推论，教授EMT的学者们说，一个人闭着眼睛用飞镖扎股票名单选出来的投资组合，其前景跟最聪明、最勤奋的证券分析师选出来的一样好。令人惊讶的是，EMT不仅受到学术界追捧，还被许多投资专业人士和企业经理人所接受。他们正确地观察到市场经常是有效率的，便错误地推论出市场永远是有效率的。这两个命题之间的差别，简直如同黑夜与白昼。"
    source_page: "concepts/有效市场"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["有效市场", "学术理论"]
    attribution: "1988 巴菲特致股东信"
    source_letter_year: 1988
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-有效市场-06"
    text: |
      "当年在格雷厄姆-纽曼公司时，我研究了该公司从1926年到1956年整个存续期间的套利收益。无杠杆年均回报率达到20%。从1956年起，我先在巴菲特合伙公司、后在伯克希尔运用格雷厄姆的套利原则......在这63年间，大盘的年均回报率（含股息）略低于10%。这意味着当初投入的1,000美元，如果全部收益都再投资的话，现在会变成40.5万美元。但如果年回报率是20%，现在就会变成9,700万美元。在我们看来，这是一个统计上显著的差异，完全可以激起人们的好奇心。"
    source_page: "concepts/有效市场"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["有效市场", "学术理论"]
    attribution: "1988 巴菲特致股东信"
    source_letter_year: 1988
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-有效市场-07"
    text: |
      "我在1984年第一次公开讨论沃尔特的卓越纪录。当时，'有效市场理论'是大多数顶级商学院投资课程的核心......那么，当学术界接触到这一全新而重要的证据时，他们做了什么？不幸的是，他们的反应太过人性化了：他们不是敞开心扉去思考，而是选择闭上了眼睛。据我所知，没有一家教授有效市场理论的商学院曾试图研究沃尔特的业绩表现。"
    source_page: "concepts/有效市场"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["有效市场", "学术理论"]
    attribution: "2006 巴菲特致股东信"
    source_letter_year: 2006
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-有效市场-09"
    text: |
      "于是，成千上万的学生被送入社会，坚信每一只股票每一天的价格都是'正确的'，而试图评估企业——也就是股票——是徒劳无功的。与此同时，沃尔特继续跑赢市场，那些年轻人所接受的错误教导反而让他的工作更轻松了。毕竟，如果你从事航运业，你所有的潜在竞争者都被教导地球是平的，对你来说可是天大的好事。"
    source_page: "concepts/有效市场"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["有效市场", "学术理论"]
    attribution: "2006 巴菲特致股东信"
    source_letter_year: 2006
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-有效市场-10"
    text: |
      "格雷厄姆的市场先生寓言，在当今的投资世界里也许显得有些过时——毕竟大多数专业人士和学者满口都是有效市场、动态对冲和贝塔系数。他们对这些东西感兴趣是可以理解的，因为笼罩着神秘面纱的技术对于投资建议的推销者来说，显然是有价值的。毕竟，有哪位巫医能靠'吃两片阿司匹林'这种简单建议就声名鹊起、财源广进的？"
    source_page: "concepts/有效市场"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["有效市场", "学术理论"]
    attribution: "1987 巴菲特致股东信"
    source_letter_year: 1987
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-有效市场-11"
    text: |
      "经济学家在思想方面最为节俭：他们把研究生院学到的东西用上了一辈子。大学金融系往往也是如此。看看在整个1970年代和1980年代，几乎所有人都多么顽固地坚守有效市场理论，轻蔑地将那些强有力的反面事实称为'异常现象'。（我一向很喜欢这种解释方式：地平说学会大概也会把轮船环球航行视为一个恼人但无关紧要的异常现象吧。）"
    source_page: "concepts/有效市场"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["有效市场", "学术理论"]
    attribution: "2010 巴菲特致股东信"
    source_letter_year: 2010
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-杠杆-01"
    text: |
      "为了得到你并不需要的东西，而拿你已经拥有和真正需要的东西去冒险，那简直是疯了。"
    source_page: "concepts/杠杆"
    type: "web-quote"
    extraction_source: "website"
    tags: ["杠杆", "风险"]
    attribution: "2017 巴菲特致股东信"
    source_letter_year: 2017
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-杠杆-02"
    text: |
      "投资没有百分之百确定的事。因此，使用杠杆是危险的。一串绝妙的数字乘以零，永远等于零。别指望能发两次财。"
    source_page: "concepts/杠杆"
    type: "web-quote"
    extraction_source: "website"
    tags: ["杠杆", "风险"]
    attribution: "2022 巴菲特致股东信"
    source_letter_year: 2022
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-杠杆-03"
    text: |
      "我们很少大量举债，即使不得不借债，也尽量以长期固定利率来安排。我们宁可放弃有吸引力的机会，也不愿过度透支资产负债表。"
    source_page: "concepts/杠杆"
    type: "web-quote"
    extraction_source: "website"
    tags: ["杠杆", "风险"]
    attribution: "1983 巴菲特致股东信"
    source_letter_year: 1983
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-杠杆-04"
    text: |
      "判断一家公司经营管理层绩效好坏的首要标准，应该是看它在不过度使用杠杆、不玩会计把戏的前提下，能否取得高水平的股本回报率。"
    source_page: "concepts/杠杆"
    type: "web-quote"
    extraction_source: "website"
    tags: ["杠杆", "风险"]
    attribution: "1979 巴菲特致股东信"
    source_letter_year: 1979
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-杠杆-05"
    text: |
      "一串绝妙的数字乘以零，永远等于零。别指望能发两次财。"
    source_page: "concepts/杠杆"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["杠杆", "风险"]
    attribution: "2022 巴菲特致股东信"
    source_letter_year: 2022
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-杠杆-06"
    text: |
      "多年来，我们对杠杆的厌恶确实拖累了回报率。但查理和我睡得很踏实。我们都认为，为了得到你并不需要的东西，而拿你已经拥有和真正需要的东西去冒险，那简直是疯了。50年前，当我们各自经营着由几位信任我们的亲朋好友出资组建的投资合伙企业时，我们就持有这样的理念。如今，伯克希尔已经拥有了上百万'合伙人'，我们的理念一如当初。"
    source_page: "concepts/杠杆"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["杠杆", "风险"]
    attribution: "2017 巴菲特致股东信"
    source_letter_year: 2017
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-杠杆-08"
    text: |
      "我们很少举债。需要指出的是，许多管理者会不同意这一政策，他们认为大量举债可以提升股东回报。而且这些更敢冒险的CEO在大多数时候是对的。"
    source_page: "concepts/杠杆"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["杠杆", "风险"]
    attribution: "2018 巴菲特致股东信"
    source_letter_year: 2018
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-杠杆-09"
    text: |
      "之后，如果一切顺利，股权开始回升，杠杆收购机构往往会寻求用新的借贷再次加杠杆。他们通常会把部分所得用来支付巨额股息，把股东权益急剧压低，有时甚至压成负数。"
    source_page: "concepts/杠杆"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["杠杆", "风险"]
    attribution: "2014 伯克希尔的过去现在与未来"
    source_letter_year: 2014
    source_letter_category: "special-letter"

  - id: "web-concepts-杠杆-10"
    text: |
      "任何一家公司的盈利能力取决于三个因素：(1) 资产的回报率；(2) 负债的成本；(3) '杠杆'的运用程度——也就是资产中有多大比例是由负债而非股东权益来支撑的。多年来，我们在第(1)点上做得相当不错。但我们同样受益于极低的负债成本。"
    source_page: "concepts/杠杆"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["杠杆", "风险"]
    attribution: "1995 巴菲特致股东信"
    source_letter_year: 1995
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-杠杆-11"
    text: |
      "判断一家公司经营管理层绩效好坏的首要标准，应该是看它在不过度使用杠杆、不玩会计把戏的前提下，能否取得高水平的股本回报率，而不是看每股收益是否持续增长。"
    source_page: "concepts/杠杆"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["杠杆", "风险"]
    attribution: "1979 巴菲特致股东信"
    source_letter_year: 1979
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-特许经营权-01"
    text: |
      "经济特许经营权产生于这样的产品或服务：(1) 它是被需要或被渴望的；(2) 顾客认为找不到近似的替代品；(3) 不受价格管制。"
    source_page: "concepts/特许经营权"
    type: "web-quote"
    extraction_source: "website"
    tags: ["特许经营权", "护城河"]
    attribution: "1991 巴菲特致股东信"
    source_letter_year: 1991
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-特许经营权-02"
    text: |
      "特许经营权能容忍糟糕的管理。无能的管理者虽然会降低特许经营的盈利能力，但不会造成致命伤害。"
    source_page: "concepts/特许经营权"
    type: "web-quote"
    extraction_source: "website"
    tags: ["特许经营权", "护城河"]
    attribution: "1991 巴菲特致股东信"
    source_letter_year: 1991
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-特许经营权-03"
    text: |
      "在永远剧烈变化的经济领域中，很难建立起堡垒般的特许经营权。而这种特许经营权，通常才是持续高回报的关键。"
    source_page: "concepts/特许经营权"
    type: "web-quote"
    extraction_source: "website"
    tags: ["特许经营权", "护城河"]
    attribution: "1987 巴菲特致股东信"
    source_letter_year: 1987
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-特许经营权-04"
    text: |
      "我们在某些股票投资上赚到了可观的收益，正是因为在喜诗身上学到的关于如何评估特许经营权的功课。"
    source_page: "concepts/特许经营权"
    type: "web-quote"
