    source_letter_year: 2024
    source_letter_category: "shareholder-letter"

  - id: "web-companies-中国石油-01"
    text: |
      "2002年和2003年，伯克希尔以4.88亿美元买入中国石油1.3%的股权，按此价格整个公司的估值约为370亿美元。当时查理和我认为这家公司大约值1,000亿美元。到2007年，有两个因素大幅提升了它的价值：油价显著攀升，而且中国石油的管理层在积累油气储量方面做得很出色。"
    source_page: "companies/中国石油"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["中国石油", "能源"]
    attribution: "2007 巴菲特致股东信"
    source_letter_year: 2007
    source_letter_category: "shareholder-letter"

  - id: "web-companies-中美能源-01"
    text: |
      "2000年初，为了弥补那次愚蠢的行为（指用股票收购通用再保险），我收购了中美能源76%的股份，这是一家管理出色的公用事业公司，为我们带来了许多盈利丰厚且对社会有益的投资机会。"
    source_page: "companies/中美能源"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["中美能源", "能源"]
    attribution: "2016 巴菲特致股东信
\"BHE之所以能做出这些投资，是因为它保留了全部收益。事实上，去年BHE留存的收益——遥遥领先——超过了美国任何其他电力公司。我们和监管机构都认为这种100%留存收益的政策是一项重要优势。\""
    source_letter_year: 2016
    source_letter_category: "shareholder-letter"

  - id: "web-companies-伊斯卡-01"
    text: |
      "伊斯卡是我见过的最令人叹为观止的制造企业，去年我就说过这话，秋天去造访了它在韩国的那家非凡工厂之后，我的印象更加深刻了。"
    source_page: "companies/伊斯卡"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["伊斯卡", "制造"]
    attribution: "2007 巴菲特致股东信
\"查理和我继续带着惊叹——和感激！——注视着伊斯卡管理团队的成就。\""
    source_letter_year: 2007
    source_letter_category: "shareholder-letter"

  - id: "web-companies-伯克希尔哈撒韦-01"
    text: |
      "1964年5月6日，伯克希尔·哈撒韦当时由一位叫西伯里·斯坦顿的人掌管，他给股东们发了一封信，提出以每股11.375美元的价格回购22.5万股股票。我一直在等那封信，但对报价感到意外。"
    source_page: "companies/伯克希尔哈撒韦"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["伯克希尔", "控股"]
    attribution: "2014 伯克希尔的过去现在与未来
\"我们的'五驾马车'——伯克希尔旗下最大的五家非保险业务——2014年税前收益达到创纪录的124亿美元。\""
    source_letter_year: 2014
    source_letter_category: "shareholder-letter"

  - id: "web-companies-伯克希尔哈撒韦能源-01"
    text: |
      "这使得伯克希尔哈撒韦能源在开发风能和太阳能项目方面比大多数公用事业公司具有重大优势。"
    source_page: "companies/伯克希尔哈撒韦能源"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["伯克希尔能源", "能源"]
    attribution: "2014 伯克希尔的过去现在与未来
\"五家之中，十年前只有伯克希尔能源是我们旗下的，当时的税前收益仅有3.93亿美元。此后我们以全现金方式收购了其中三家。\""
    source_letter_year: 2014
    source_letter_category: "shareholder-letter"

  - id: "web-companies-克莱顿房屋-01"
    text: |
      "老读者都知道，我们的并购案来源经常出人意料。但要说起源最奇特的，没有哪一笔比得上我们去年收购克莱顿房屋了。"
    source_page: "companies/克莱顿房屋"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["克莱顿房屋", "房地产"]
    attribution: "2003 巴菲特致股东信
\"克莱顿盈利的关键在于公司130亿美元的抵押贷款组合。2008-2009年金融恐慌期间，行业融资枯竭，但克莱顿凭借伯克希尔的支持得以继续放贷。事实上，在那段时期，我们不仅为自己的零售业务提供资金，还为竞争对手的零售业务提供融资。\""
    source_letter_year: 2003
    source_letter_category: "shareholder-letter"

  - id: "web-companies-内布拉斯加家具店-01"
    text: |
      "在评估一家企业时，我总会问自己一个问题：假如我拥有充足的资金和人才，我愿不愿意跟它竞争？我宁可跟灰熊摔跤，也不愿跟B夫人和她的后代竞争。"
    source_page: "companies/内布拉斯加家具店"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["内布拉斯加家具店", "零售"]
    attribution: "1983 巴菲特致股东信
\"B夫人唯一的儿子路易在美国陆军服役四年后重返家族店铺......B夫人和路易重聚之后，NFM就势不可挡了。在梦想的驱动下，母子俩起早贪黑、常年无休。结果创造了零售业的一个奇迹。\""
    source_letter_year: 1983
    source_letter_category: "shareholder-letter"

  - id: "web-companies-冰雪皇后-01"
    text: |
      "这两家企业完全符合我们的标准：业务易于理解、拥有优秀的经济特质、由杰出的管理者经营。"
    source_page: "companies/冰雪皇后"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["冰雪皇后", "餐饮"]
    attribution: "1997 巴菲特致股东信（谈收购冰雪皇后和明星家具）
\"有些机构质疑我的'独立性'，理由之一是麦克莱恩和冰雪皇后购买大量可口可乐产品。他们难道想让我们改买百事可乐？\""
    source_letter_year: 1997
    source_letter_category: "shareholder-letter"

  - id: "web-companies-利捷航空-01"
    text: |
      "在利捷航空——共享飞机所有权的发明者——我们仍然是无可挑战的行业领袖。目前我们在美国运营487架飞机，在欧洲运营135架，机队规模超过三大主要竞争对手加在一起的两倍。"
    source_page: "companies/利捷航空"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["利捷航空", "航空"]
    attribution: "2007 巴菲特致股东信
\"去年伯克希尔面临的最大问题是利捷航空，一家提供飞机部分所有权的航空运营商。\""
    source_letter_year: 2007
    source_letter_category: "shareholder-letter"

  - id: "web-companies-华盛顿邮报-01"
    text: |
      "符合这些标准的股票，我们打算长期持有；事实上，我们最大的一笔股权投资是467,150股华盛顿邮报B股，成本约1,060万美元，我们计划永久持有。"
    source_page: "companies/华盛顿邮报"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["华盛顿邮报", "媒体"]
    attribution: "1975 巴菲特致股东信
\"许多年前，一个好的1,000万美元投资机会就能为我们创造奇迹（想想1973年投资华盛顿邮报或1976年投资盖可保险的案例）。如今，就算有十个这样的机会，每个都增值到三倍，也仅仅能让伯克希尔的净资产增加0.25%。\""
    source_letter_year: 1975
    source_letter_category: "shareholder-letter"

  - id: "web-companies-卡夫亨氏-01"
    text: |
      "两年前，我的朋友豪尔赫·保罗·雷曼邀请伯克希尔加入他的3G资本集团，共同收购亨氏。我毫不犹豫地答应了：我当即就知道，无论从个人交情还是财务回报来看，这次合作一定会顺利。"
    source_page: "companies/卡夫亨氏"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["卡夫亨氏", "消费品"]
    attribution: "2014 巴菲特致股东信
\"豪尔赫·保罗和他的伙伴们是再好不过的合作伙伴了。我们和他们一样，热衷于买入、打造并永远持有满足人们基本需求和欲望的大型企业。不过在追求这个目标的过程中，我们走的是不同的路。\""
    source_letter_year: 2014
    source_letter_category: "shareholder-letter"

  - id: "web-companies-可口可乐-01"
    text: |
      "当我们持有既拥有出色业务又拥有出色管理层的公司股份时，我们最喜欢的持有期限是——永远。"
    source_page: "companies/可口可乐"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["可口可乐", "品牌"]
    attribution: "1988 巴菲特致股东信
