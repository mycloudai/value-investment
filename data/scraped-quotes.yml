      "查理跟我在伯克希尔的活儿其实很轻松：我们几乎什么都不做，除了配置资本。即便如此，我们也不是特别勤快。不过我们有一个借口：在资本配置领域，做得多并不等于做得好。事实上，在投资和并购领域，过于疯狂的行动往往适得其反。因此，查理跟我通常就是静静地坐着等电话铃响。"
