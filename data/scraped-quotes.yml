  - id: "local-partnership-letters-1963-md-07"
    text: |
      （1）将存货从逾400万美元（其中大量是周转极慢的滞销品）压缩至100万美元以下，大幅降低了存货持有成本，也极大地减少了商品过时淘汰的风险； （2）腾出资金用于投资有价证券，由此获得超过40万美元的收益； （3）将销售及管理费用从每月150,000美元削减至75,000美元； （4）将工厂间接制造费用从每直接工时6美元降至4.50美元； （5）关闭五家亏损分公司（保留三家盈利的），以效率更高的分销商取而代之； （6）整顿了内布拉斯加州哥伦布市一家配件工厂长期存在的乱象； （7）砍掉了消耗大量资金却贡献零利润的承包业务（释放出的资金可投入证券获利）； （8）调整了维修配件的定价，在几乎不影响销量的前提下，估计多增加了200,000美元的利润；以及最重要的—— （9）通过以上种种措施，使登普斯特的盈利能力恢复到与所用资本规模相称的水平。
    source_page: "partnership-letters/1963.md"
    type: "blockquote"
    extraction_source: "local-md"
