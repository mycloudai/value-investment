    source_letter_year: 1991
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-特许经营权-05"
    text: |
      "我们拥有保险行业最优秀的管理团队，而且在大多数情况下，他们管理着根基深厚、价值非凡的特许经营权。"
    source_page: "concepts/特许经营权"
    type: "web-quote"
    extraction_source: "website"
    tags: ["特许经营权", "护城河"]
    attribution: "2008 巴菲特致股东信"
    source_letter_year: 2008
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-特许经营权-06"
    text: "经济特许经营权产生于这样的产品或服务：(1) 它是被需要或被渴望的；(2) 顾客认为找不到近似的替代品；(3) 不受价格管制。"
    source_page: "concepts/特许经营权"
