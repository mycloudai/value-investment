      （1）债券部分：我们投入了260,773美元，平均持有时间不足五个月。我们收到了6.5%的利息，并实现了14,446美元的资本利得，综合年化收益率约为20%。 （2）股票和认股权证部分：我们已实现资本利得89,304美元，还有目前估值约2,946美元的少量尾款尚未收到。4月份初始投入146,000美元，持仓陆续增加，至10月份总投入达731,000美元。按资金实际使用时间计算，年化收益率约为22%。
