  - id: "local-partnership-letters-1964-md-04"
    text: |
      (1) 按照这么高的收益率复合增长，任何规模可观的资金都会以惊人的速度膨胀，迅速逼近国债规模。 (2) 合伙基金成立这八年以来，由于股票整体价值重估，股票投资实现了很高的整体收益率，这个水平在未来数十年无法持续。在我们基金的短短历史中，道指收益率是 11.1%。我认为把时间拉长到二三十年，道指更合理的长期年均收益率应该在 6%-7% 之间。这一个因素就会把我们的年化复合收益率拉低约 4 个百分点。只要 1965 年道指下跌 20.5%，它九年的平均收益率就会降至 7%。对于这样幅度的下跌，甚至更大的下跌，长期持有股票的投资者都应该早有思想准备。如果你持有的股票（比如你在合伙基金中的权益）市值下跌 20% 或 30%，你就会遭受情感创伤或陷入财务困境，那你就不适合投资股票。借用"诗人"哈里·杜鲁门（Harry Truman）的话说："受不了热，就别进厨房。"（If you can't stand the heat, stay out of the kitchen.）最好在进"厨房"之前先想清楚。 (3) 我们认为，从长期来看，不可能始终保持合伙基金领先道指 16.6 个百分点的优势，或有限合伙人领先道指 11.2 个百分点的优势。合伙基金已经连续八年跑赢道指，尽管其中有一年扣除利润提成后，有限合伙人没能跑赢。我们肯定会有合伙基金落后于道指的年份，而且肯定不止一年。发生这种情况时，我作为普通合伙人一定会气得咬牙切齿（希望各位有限合伙人不要太懊恼）。届时，我们的平均相对优势会大幅下降。我也相信，有些年份我们仍然会取得明显的领先。迄今为止，我们没有一年的业绩是平庸或糟糕的，这让我们的平均收益率显得很高，但期望这种好运永久持续显然是不现实的。
    source_page: "partnership-letters/1964.md"
    type: "blockquote"
    extraction_source: "local-md"
    tags: ["1964", "信件"]
    page_title: "1964年巴菲特致合伙人信（中文全文）"
    source_letter_year: 1964
    source_letter_category: "partnership-letter"

  - id: "local-partnership-letters-1964-md-05"
    text: |
      (1) 道指长期整体收益率（含股息）平均约为每年 7%，但各年振幅极大——极端情况下可能跌 40% 或涨 50%，大多数年份在跌 10% 到涨 20% 之间。 (2) 扣除普通合伙人分成之前，合伙基金长期年均领先道指约 10 个百分点——领先优势同样剧烈波动：形势不利时可能落后 10 个百分点，一切顺风顺水时可能领先 25 个百分点。 (3) 综合以上两点，合伙基金的长期年均收益率约为 17%，有限合伙人约为 14%。各年收益率会相差悬殊，具体振幅取决于（1）和（2）两个变量的相互作用。
    source_page: "partnership-letters/1964.md"
