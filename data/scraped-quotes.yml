  - id: "web-concepts-透视盈余-01"
    text: |
      "在我们看来，衡量伯克希尔基本盈利能力的最佳方法是'透视收益'法，即在我们自己的报告经营收益基础上，加上被投资公司留存收益中属于我们的份额，两种情况下均不包括资本利得。"
    source_page: "concepts/透视盈余"
