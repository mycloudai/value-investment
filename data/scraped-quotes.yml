  - id: "local-concepts-mr-market-md-02"
    text: |
      事实上，真正的投资者*欢迎*波动还来不及呢。本杰明·格雷厄姆在《聪明的投资者》第八章做过解释。他在书中介绍了"市场先生"——一个殷勤的家伙，每天都会出现在你面前，随时愿意买你的股票或卖给你，任君选择。这位老兄越是喜怒无常，投资者的机会就越多。道理很简单：市场剧烈波动意味着好公司时不时会出现不合理的低价。很难想象，为什么这种低价的出现会被视为增加了投资者的风险。
