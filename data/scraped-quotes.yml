    attribution: "2020 巴菲特致股东信"
    source_letter_year: 2020
    source_letter_category: "shareholder-letter"

  - id: "web-companies-富国银行-01"
    text: |
      "在富国银行，我们认为找到了银行业最好的管理者——卡尔·理查德和保罗·哈森。在很多方面，卡尔和保罗的组合让我联想到另一对搭档——大都会/ABC的汤姆·墨菲和丹·伯克。"
    source_page: "companies/富国银行"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["富国银行", "银行"]
    attribution: "1990 巴菲特致股东信
\"由于20:1的杠杆比率会放大管理上的优势和劣势，我们对以'便宜'的价格买入管理不善的银行毫无兴趣。相反，我们唯一感兴趣的是以合理的价格买入管理优秀的银行。\""
    source_letter_year: 1990
    source_letter_category: "shareholder-letter"

  - id: "web-companies-州立农业保险-01"
    text: |
      "即便是好事达保险和州立农业保险这样庞大的直销型保险公司，成本也明显高于盖可保险。"
    source_page: "companies/州立农业保险"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["州立农业", "保险"]
    attribution: "1986 巴菲特致股东信
\"1922年，乔治·梅切尔——伊利诺伊州梅尔纳市的一个农场主——创立了州立农业保险公司，旨在打破行业高成本巨头维持的价格保护伞。凭借低成本结构，州立农业保险最终拿下了行业第一的位置。\""
    source_letter_year: 1986
    source_letter_category: "shareholder-letter"

  - id: "web-companies-布法罗新闻报-01"
    text: |
      "像喜诗糖果和布法罗新闻报这样的业务，目前的价值大约是账面价值的15到20倍。"
    source_page: "companies/布法罗新闻报"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["布法罗新闻报", "媒体"]
    attribution: "1999 巴菲特致股东信
\"出版商们——包括伯克希尔旗下的布法罗新闻报——在互联网上免费提供报纸内容，同时却对纸质版收取不低的费用。这除了导致纸质报纸发行量急剧稳步下降之外，还能带来什么结果呢？\""
    source_letter_year: 1999
    source_letter_category: "shareholder-letter"

  - id: "web-companies-康菲石油-01"
    text: "巴菲特在2008年致股东信中坦诚承认，在油价高位大幅增持康菲石油是一个重大错误。他没有试图预测油价走势的能力，却在高价时做出了大规模的择时判断，这违背了他自己的投资原则。"
    source_page: "companies/康菲石油"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["康菲石油", "能源"]
    attribution: "2008 巴菲特致股东信
康菲石油从伯克希尔的前五大持仓（2008年8,490万股）逐年缩减至2012年的2,400万股，这一减持过程本身就是巴菲特\"知错就改\"投资风格的无声注脚。"
    source_letter_year: 2008
    source_letter_category: "shareholder-letter"

  - id: "web-companies-德克斯特鞋业-01"
    text: |
      "我犯了一个更大的错误——我对德克斯特鞋业说了'行'。这是1993年我用价值4.33亿美元的伯克希尔股票收购的一家制鞋公司。我当时评估的持久竞争优势，在短短几年内就烟消云散了。但这只是开头：由于我用的是伯克希尔的股票，我把这个错误成倍放大了。"
    source_page: "companies/德克斯特鞋业"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["德克斯特鞋业", "制造"]
    attribution: "2007 巴菲特致股东信
\"1993年我们收购这家公司时，它业绩出色，在我看来完全不像烟蒂股。然而，由于海外竞争的冲击，它的竞争优势很快便蒸发殆尽。而我根本没有预见到这一点。\""
    source_letter_year: 2007
    source_letter_category: "shareholder-letter"

  - id: "web-companies-房地美-01"
    text: |
      "1988年，我们大手笔买进了联邦住宅贷款抵押公司优先股（'房地美'）和可口可乐。我们打算长期持有这些证券。事实上，当我们持有既拥有出色业务又拥有出色管理层的公司股份时，我们最喜欢的持有期限是——永远。"
    source_page: "companies/房地美"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["房地美", "金融"]
    attribution: "1988 巴菲特致股东信
\"如果我们因为南加州大地震而承受巨额巨灾赔付，那同时我们在喜诗糖果、富国银行和联邦住宅贷款抵押公司（房地美）的持股价值也很可能大幅缩水。\""
    source_letter_year: 1988
    source_letter_category: "shareholder-letter"

  - id: "web-companies-所罗门-01"
    text: |
      "1989年，我宣布我们买了价值10亿美元的可口可乐股票。我把这描述为'用真金白银印证我的嘴巴说过的话'。去年8月18日，当我被选为所罗门公司的临时董事长时，情况反了过来：我是在'用嘴巴去维护我们投出去的真金白银'。"
    source_page: "companies/所罗门"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["所罗门", "投行"]
    attribution: "1991 巴菲特致股东信
\"同理，如果有任何重大坏消息，请立即告诉我。我能处理坏消息，但我不喜欢在它发酵了一阵子之后再来处理。正是因为不愿立即面对坏消息，所罗门公司的一个原本很容易化解的问题，才演变成了几乎让一家拥有8,000名员工的公司倒闭的大祸。\""
    source_letter_year: 1991
    source_letter_category: "shareholder-letter"

  - id: "web-companies-斯科特费泽-01"
    text: |
      "伯克希尔在1986年初收购了斯科特费泽。我们花了3.152亿美元，当时账面价值为1.726亿美元。我们支付的1.426亿美元溢价，意味着我们认为该公司的内在价值大约是其账面价值的两倍。"
    source_page: "companies/斯科特费泽"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["斯科特费泽", "制造"]
    attribution: "1994 巴菲特致股东信
\"斯科特费泽的内在价值与其在伯克希尔账面上的帐列价值之间的差距现在已经非常巨大。这种令人愉悦的不对称，功劳完全归于拉尔夫·谢伊，一位专注、聪明且品格出众的经理人。\""
    source_letter_year: 1994
    source_letter_category: "shareholder-letter"

  - id: "web-companies-森林河公司-01"
    text: |
      "森林河拥有82家工厂，我一家都还没去过（总部也没去过）。没有必要；公司CEO皮特·利格尔把企业经营得好极了。"
    source_page: "companies/森林河公司"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["森林河", "制造"]
    attribution: "2010 巴菲特致股东信
\"2005年6月21日，我第一次听说森林河公司——这家由皮特在印第安纳州创立并管理的公司。那天，我收到一位中间人的来信，详细介绍了这家房车制造商的相关数据。写信人说，森林河公司的唯一股东皮特特别希望把公司卖给伯克希尔。他还告诉了我皮特期望的售价。我喜欢这种干脆利落的方式。\""
    source_letter_year: 2010
    source_letter_category: "shareholder-letter"

  - id: "web-companies-比亚迪-01"
    text: |
      "代表'未来'的则是一辆由比亚迪开发的新型插电式电动车——这是一家令人惊叹的中国公司，我们持有其10%的股权。"
    source_page: "companies/比亚迪"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["比亚迪", "汽车"]
    attribution: "2008 巴菲特致股东信
比亚迪从2009年至2020年连续出现在伯克希尔的主要持仓列表中，最初投入2.32亿美元，到2020年底市值达58.97亿美元——这一数据本身就是最有力的评价。"
    source_letter_year: 2008
    source_letter_category: "shareholder-letter"

  - id: "web-companies-波仙珠宝-01"
    text: |
      "波仙珠宝加入伯克希尔的第一年便达到了我们所有的预期。艾克·弗里德曼是波仙的管理天才——我是认真的——他只有一个速度：快进。"
    source_page: "companies/波仙珠宝"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["波仙珠宝", "零售"]
    attribution: "1989 巴菲特致股东信
\"我可以向你保证，信任艾克·弗里德曼和他的家人的人永远不会失望。我们收购波仙股权的方式本身就是最好的证明——没有审计的财务报表，没有盘点存货，也没有核实应收账款。艾克只是告诉我们实际情况如何，于是我们草拟了一页纸的合同，开出了一大张支票。\""
    source_letter_year: 1989
    source_letter_category: "shareholder-letter"

  - id: "web-companies-特许通讯-01"
    text: "特许通讯从2016年至2019年连续四年出现在伯克希尔的前十五大持仓列表中，持股比例稳定在2.5%-3.0%之间，反映了伯克希尔对有线宽带行业竞争地位的长期看好。"
    source_page: "companies/特许通讯"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["特许通讯", "通讯"]
    attribution: "2016 巴菲特致股东信 至 2019 巴菲特致股东信"
    source_letter_year: 2016
    source_letter_category: "shareholder-letter"

  - id: "web-companies-盖可保险-01"
    text: |
      "低成本生产商（盖可保险、好市多）……一道难以逾越的屏障是企业持续成功的根本保障。商业史上充斥着'罗马烟火筒'式的公司——它们的'护城河'最终被证明是海市蜃楼，转眼就被对手跨越了。"
    source_page: "companies/盖可保险"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["盖可保险", "保险"]
    attribution: "2007 巴菲特致股东信
\"1996年初，我们收购了盖可保险剩余一半的股权……凭借几乎无限的增长潜力，GEICO很快成为我们的核心，我相信围绕它打造出的，是当今世界首屈一指的财产意外险业务。\""
    source_letter_year: 2007
    source_letter_category: "shareholder-letter"

  - id: "web-companies-科比吸尘器-01"
    text: |
      "斯科特费泽旗下两大业务——世界图书百科全书和柯比吸尘器——各自单独列示。"
    source_page: "companies/科比吸尘器"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["科比", "制造"]
    attribution: "1986 巴菲特致股东信
\"布法罗新闻报、菲希海默制服、柯比吸尘器、内布拉斯加家具店、斯科特费泽制造集团、喜诗糖果和世界图书公司。1987年，这七家企业合计的息税前利润高达1.8亿美元。\""
    source_letter_year: 1986
    source_letter_category: "shareholder-letter"

  - id: "web-companies-穆迪-01"
    text: |
      "截至2022年底，伯克希尔是其中八家巨头的最大股东：美国运通、美国银行、雪佛龙、可口可乐、惠普、穆迪、西方石油和派拉蒙全球。"
    source_page: "companies/穆迪"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["穆迪", "金融服务"]
    attribution: "2022 巴菲特致股东信
\"规模庞大、利润丰厚且家喻户晓的企业的一小部分股权，比如苹果、美国运通、可口可乐和穆迪。其中许多公司在经营所需的净有形权益上获得了非常高的回报。\""
    source_letter_year: 2022
    source_letter_category: "shareholder-letter"

  - id: "web-companies-精密铸件-01"
    text: |
      "明年，我要向大家介绍的将是'六驾马车'。新成员是精密铸件公司，一个月前我们以超过320亿美元的现金收购了它。PCC完美契合伯克希尔的商业模式，将大幅提升我们的经常性每股盈利能力。"
    source_page: "companies/精密铸件"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["精密铸件", "制造"]
    attribution: "2015 巴菲特致股东信
\"那笔令人难堪的110亿美元减值，几乎全部是我2016年犯下的一个错误的数字化体现。那一年，伯克希尔收购了精密铸件公司，我付的价格太高了。\""
    source_letter_year: 2015
    source_letter_category: "shareholder-letter"

  - id: "web-companies-约翰斯曼维尔-01"
    text: |
      "2009年，我们旗下所有与住宅和商业建筑相关的业务都遭到了沉重打击。萧氏工业、约翰斯曼维尔、阿克米砖业和MiTek的税前利润合计为2.27亿美元，较2006年建筑业繁荣期的12.95亿美元下降了82.5%。这些企业仍在低谷中挣扎，但它们的竞争地位依然完好无损。"
    source_page: "companies/约翰斯曼维尔"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["约翰斯曼维尔", "建材"]
    attribution: "2009 巴菲特致股东信"
    source_letter_year: 2009
    source_letter_category: "shareholder-letter"

  - id: "web-companies-纽约梅隆银行-01"
    text: |
      纽约梅隆银行连续多年出现在伯克希尔的前十五大持仓中（2017-2020年），持股比例从5.3%增至最高9.0%，体现了巴菲特对这类"金融基础设施"型企业的认可。
    source_page: "companies/纽约梅隆银行"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["纽约梅隆", "银行"]
    attribution: "2017 巴菲特致股东信 至 2020 巴菲特致股东信"
    source_letter_year: 2017
    source_letter_category: "shareholder-letter"

  - id: "web-companies-美国合众银行-01"
    text: "（巴菲特在致股东信中长期将合众银行列为伯克希尔的重要持仓，从2006年到2020年连续15年出现在前十五大持仓名单中，体现了他对这家银行持久而稳定的信心。）"
    source_page: "companies/美国合众银行"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["合众银行", "银行"]
    attribution: "2006 巴菲特致股东信 至 2020 巴菲特致股东信
合众银行连年出现在伯克希尔的主要持仓列表中，持股比例从最初的1.8%稳步提升至近10%，这种渐进式增持模式体现了巴菲特\"以合理价格持续买入优质银行\"的投资理念。"
    source_letter_year: 2006
    source_letter_category: "shareholder-letter"

  - id: "web-companies-美国家庭服务-01"
    text: |
      "我们把这一业务统称为美国家庭服务公司。不过在各个地方，它以所收购的当地公司的名义经营。在我们运营的大多数大都市地区，我们都是无可争议的市场领导者。"
    source_page: "companies/美国家庭服务"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["家庭服务", "服务"]
    attribution: "2002 巴菲特致股东信
\"我们拥有一位出色的经理人罗恩·佩尔蒂尔，他凭借自身的收购和运营才能，正在打造一个房产经纪帝国。\""
    source_letter_year: 2002
    source_letter_category: "shareholder-letter"

  - id: "web-companies-美国运通-01"
    text: |
      "盖可保险当时的困境类似于1964年色拉油丑闻之后的美国运通。两家都是独一无二的公司，暂时因为一场财务打击而摇摇欲坠，但其卓越的基本经济实力并未被摧毁。"
    source_page: "companies/美国运通"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["美国运通", "金融"]
    attribution: "1980 巴菲特致股东信
\"当一家优秀的企业遭遇一次性的重大但可解决的难题时——就像多年前美国运通和盖可保险都经历过的那样——绝佳的投资机会就出现了。\""
    source_letter_year: 1980
    source_letter_category: "shareholder-letter"

  - id: "web-companies-美国银行-01"
    text: |
      "我们很可能会在期权到期前购入。同时，请大家了解，美国银行实际上是我们的第五大股票投资，我们非常看重它。"
    source_page: "companies/美国银行"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["美国银行", "银行"]
    attribution: "2013 巴菲特致股东信
\"未列入上表——但很重要——的是我们持有的50亿美元美国银行优先股。这些优先股每年为我们带来3亿美元的股息，同时附带一份价值可观的认股权证。\""
    source_letter_year: 2013
    source_letter_category: "shareholder-letter"

  - id: "web-companies-苹果-01"
    text: |
      "伯克希尔对苹果的投资生动地展示了回购的威力。我们从2016年末开始买入苹果股票，到2018年7月初完成购买时，伯克希尔的一般账户持有苹果5.2%的股份。"
    source_page: "companies/苹果"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["苹果", "科技"]
    attribution: "2020 巴菲特致股东信
\"尽管卖了一部分——瞧！——伯克希尔目前持有苹果5.4%的股份。这个比例的增加对我们来说是零成本的，原因是苹果一直在持续回购自家股票，大幅减少了流通股数量。\""
    source_letter_year: 2020
    source_letter_category: "shareholder-letter"

  - id: "web-companies-蓝筹印花-01"
    text: |
      "查理和我其实比他们更早就发现了'奖励回馈'这个绝妙点子的魅力。被这一洞察所鼓舞，我们俩早在1970年就杀入了奖励回馈行业——方式是收购了一家印花交易公司蓝筹印花。那一年，蓝筹印花的营业额为1.26亿美元。"
    source_page: "companies/蓝筹印花"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["蓝筹印花", "控股"]
    attribution: "2006 巴菲特致股东信
\"1972年是伯克希尔的一个转折点。那时我们有机会为蓝筹印花收购喜诗糖果——查理、我和伯克希尔都持有蓝筹印花的大量股份，后来蓝筹印花并入了伯克希尔。\""
    source_letter_year: 2006
    source_letter_category: "shareholder-letter"

  - id: "web-companies-西方石油-01"
    text: |
      "截至年底，伯克希尔持有西方石油27.8%的普通股，同时持有认股权证，在超过五年的时间里给予我们以固定价格大幅增持的选择权。虽然我们非常喜欢我们的持股和这份期权，但伯克希尔无意收购或管理西方石油。"
    source_page: "companies/西方石油"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["西方石油", "能源"]
    attribution: "2023 巴菲特致股东信
\"我们特别看好它在美国的巨大油气储备，以及它在碳捕捉技术方面的领先地位——尽管这项技术的经济可行性尚未得到证实。这两项业务都非常符合我国的利益。\""
    source_letter_year: 2023
    source_letter_category: "shareholder-letter"

  - id: "web-companies-费希海默制服-01"
    text: |
      "由于收购了斯科特费泽和菲希海默，我们新增了四条业务线。"
    source_page: "companies/费希海默制服"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["费希海默", "制造"]
    attribution: "1986 巴菲特致股东信
\"布法罗新闻报、菲希海默制服、柯比吸尘器、内布拉斯加家具店、斯科特费泽制造集团、喜诗糖果和世界图书公司。1987年，这七家企业合计的息税前利润高达1.8亿美元。\""
    source_letter_year: 1986
    source_letter_category: "shareholder-letter"

  - id: "web-companies-路博润-01"
    text: |
      "9月16日，我们收购了路博润，这是一家全球性的添加剂及其他特种化学品生产商。自2004年詹姆斯·汉布里克担任CEO以来，公司业绩记录非常出色，税前利润从1.47亿美元增长到10.85亿美元。路博润在特种化学品领域将有更多增长机会。"
    source_page: "companies/路博润"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["路博润", "化工"]
    attribution: "2011 巴菲特致股东信
\"BNSF铁路、伊斯卡、路博润、马蒙集团和中美能源——我们最赚钱的五家非保险公司——2012年税前收益超过100亿美元。\""
    source_letter_year: 2011
    source_letter_category: "shareholder-letter"

  - id: "web-companies-通用再保险-01"
    text: |
      "我在1998年做出的一个决定，当时我把通用再保险买了下来，却没有首先做好核查工作。至今，这个错误仍在吞噬利润。"
    source_page: "companies/通用再保险"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["通用再保险", "保险"]
    attribution: "2006 巴菲特致股东信
\"我们的第三大保险重镇是通用再保险。几年前这家公司还处于困境之中；如今它已是我们保险皇冠上一颗璀璨的宝石。\""
    source_letter_year: 2006
    source_letter_category: "shareholder-letter"

  - id: "web-companies-通用汽车-01"
    text: |
      "这总比那种'我们持有AT&T、通用电气、IBM和通用汽车，所以很保守'（完全不谈买入价格）的说法更有说服力。评估任何投资方式是否保守，应以合理的客观标准为依据。"
    source_page: "companies/通用汽车"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["通用汽车", "汽车"]
    attribution: "1964 巴菲特致合伙人信
\"查理跟我穷尽一生寻找，也只能辨认出少数几家'确定性'公司。仅凭市场领导地位并不能保证什么：看看几年前通用汽车、IBM和西尔斯遭受的冲击吧——它们都曾享受过似乎不可撼动的漫长统治期。\""
    source_letter_year: 1964
    source_letter_category: "partnership-letter"

  - id: "web-companies-通用电气-01"
    text: |
      "好的方面是，去年我们在箭牌、高盛和通用电气发行的固定收益证券上总共投入了145亿美元。我们非常喜欢这些投资安排——它们本身就有很高的当期收益率，足以使这些投资相当令人满意。"
    source_page: "companies/通用电气"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["通用电气", "工业"]
    attribution: "2008 巴菲特致股东信
\"少数CEO，比如通用电气的杰夫·伊梅尔特，率先推出了对管理层和股东都公平的方案。然而总的来说，他的榜样获得的赞美远多于实际的跟进。\""
    source_letter_year: 2008
    source_letter_category: "shareholder-letter"

  - id: "web-companies-雪佛龙-01"
    text: |
      "截至2022年底，伯克希尔是其中八家巨头的最大股东：美国运通、美国银行、雪佛龙、可口可乐、惠普、穆迪、西方石油和派拉蒙全球。"
    source_page: "companies/雪佛龙"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["雪佛龙", "能源"]
    attribution: "2022 巴菲特致股东信
雪佛龙在2020年首次出现在伯克希尔的持仓表中，便以约40亿美元的投入进入了前十五大持仓行列。此后持续大幅增持，到2022年已成为伯克希尔最重要的能源持仓之一。"
    source_letter_year: 2022
    source_letter_category: "shareholder-letter"

  - id: "web-companies-韦斯科-01"
    text: |
      "我强烈建议各位阅读查理·芒格致韦斯科金融股东的信，信中描述了这家子公司的各项业务。"
    source_page: "companies/韦斯科"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["韦斯科", "控股"]
    attribution: "1986 巴菲特致股东信（类似推荐出现在1985-1989年多封信中）
\"下表显示伯克希尔报告收益的来源。伯克希尔拥有蓝筹印花约60%的股权，而蓝筹印花又拥有韦斯科金融公司80%的股权。\""
    source_letter_year: 1986
    source_letter_category: "shareholder-letter"

  - id: "web-companies-飞安公司-01"
    text: |
      "一个良好但远非出色的生意案例，是我们自己的飞安公司。这家公司为客户创造的价值，在我所知的企业中首屈一指。它还拥有持久的竞争优势：接受飞行训练时舍弃最好的公司而选择其他公司，就像做外科手术时选择出价最低的医生一样。"
    source_page: "companies/飞安公司"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["飞安公司", "服务"]
    attribution: "2007 巴菲特致股东信
\"我84岁的老朋友阿尔·尤尔斯基，依然以他1951年用1万美元创立公司时同样的激情在经营飞安公司。\""
    source_letter_year: 2007
    source_letter_category: "shareholder-letter"

  - id: "web-companies-马蒙集团-01"
    text: |
      "我们不久将收购马蒙60%的股份，并将在六年内收购其余几乎全部股份。这笔交易的方式正合杰伊的心意。我们仅凭马蒙的财务报表就确定了价格，没有聘请顾问，也没有斤斤计较。"
    source_page: "companies/马蒙集团"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["马蒙集团", "工业"]
    attribution: "2007 巴菲特致股东信
\"我知道这家公司会和普利兹克家族描述的完全一致，他们也知道无论金融市场多么混乱，我们都会准时交割。过去一年里，许多大型交易被重新谈判或彻底取消了。但对普利兹克家族来说，就像对伯克希尔一样，一言为定。\""
    source_letter_year: 2007
    source_letter_category: "shareholder-letter"

  - id: "web-companies-鲜果布衣-01"
    text: |
      "鲜果布衣拥有三大核心资产：一个有148年历史、全球家喻户晓的品牌；低成本的制造能力；以及其CEO约翰·霍兰德。"
    source_page: "companies/鲜果布衣"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["鲜果布衣", "服装"]
    attribution: "2003 巴菲特致股东信
\"鲜果布衣的单位销量增长了1,000万打，增幅达14%。查理向我保证女性并没有穿更多的内衣。有了这位专家的意见，我只能得出结论：我们在女性内衣品类的市场份额一定在快速增长。多亏了约翰·霍兰德，鲜果布衣又焕发了生机。\""
    source_letter_year: 2003
    source_letter_category: "shareholder-letter"

  - id: "web-companies-麦克莱恩-01"
    text: |
      "高盛的拜伦·特罗特告诉我，沃尔玛有意出售其子公司麦克莱恩。这是一家好公司，只是不在沃尔玛未来发展的核心版图内。但对我们来说，简直是量身定做。"
    source_page: "companies/麦克莱恩"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["麦克莱恩", "分销"]
    attribution: "2003 巴菲特致股东信
\"麦克莱恩是我们旗下的大型分销公司，由格雷迪·罗西尔运营，2011年新增了一些重要客户，税前收益创下3.7亿美元的新纪录。自2003年以15亿美元收购以来，公司累计税前收益达24亿美元。\""
    source_letter_year: 2003
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-买入价格-01"
    text: |
      "以合理的价格买入一家好公司，远远好过以便宜的价格买入一家普通的公司。查理很早就明白这个道理；我的反应比较迟钝。但现在不管是买企业还是买股票，我们都只找一流的公司配上一流的管理层。"
    source_page: "concepts/买入价格"
    type: "web-quote"
    extraction_source: "website"
    tags: ["买入价格", "估值"]
