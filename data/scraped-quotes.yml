  - id: "web-concepts-账面价值-01"
    text: |
      "在现任管理层接手的22年以来，每股账面价值由19.46美元增长到2,073.06美元，年复合增长率为23.3%。在计算每股账面价值时，分子与分母同样重要：过去22年间，公司净资产增长了106倍，而流通在外的股份却增加不到1%。"
    source_page: "concepts/账面价值"
    type: "web-quote"
    extraction_source: "website"
    tags: ["账面价值", "估值"]
