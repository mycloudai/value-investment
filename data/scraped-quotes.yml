  - id: "web-berkshire-2008-巴菲特致股东信-02"
    text: "自1979年起，会计准则要求保险公司按市价而非此前的成本与市价孰低法计量权益类证券。本表中，伯克希尔1978年及以前的数据已按新规则进行了追溯调整。其他方面的数据均采用当初的原始报告数字。"
    source_page: "berkshire/2008-巴菲特致股东信"
    type: "web-summary"
    extraction_source: "website"
    tags: ["2008", "股东信"]

  - id: "web-companies-BNSF铁路-01"
    text: |
      "2010年的亮点是我们收购了伯灵顿北方圣太菲铁路，这笔交易的效果比我预期的还要好。现在看来，拥有这条铁路将使伯克希尔的'常规'盈利能力税前增长近40%，税后增长远超30%。"
    source_page: "companies/BNSF铁路"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["BNSF铁路", "交通"]
    attribution: "2010 巴菲特致股东信
\"BNSF铁路，我们的第三大巨头，继续扮演着美国商业第一大动脉的角色，使其成为美国和伯克希尔都不可或缺的资产。如果BNSF承运的众多重要产品改用卡车运输，美国的碳排放量将飙升。\""
    source_letter_year: 2010
    source_letter_category: "shareholder-letter"

  - id: "web-companies-IBM-01"
    text: |
      "投资109亿美元购入6,390万股IBM股票。算上IBM，我们现在持有四家卓越公司的大量股权：美国运通13.0%、可口可乐8.8%、IBM 5.5%和富国银行7.6%。"
    source_page: "companies/IBM"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["IBM", "科技"]
    attribution: "2011 巴菲特致股东信
\"最终，我们对IBM投资的成败将主要取决于其未来的盈利。但一个重要的次要因素是，公司用它可能投入的巨额资金回购了多少股票。如果回购最终把IBM的流通股减少到6,390万股（只剩我一个人），我将放弃我著名的节俭作风，给伯克希尔的员工放一天带薪假。\""
    source_letter_year: 2011
    source_letter_category: "shareholder-letter"

  - id: "web-companies-三井物产-01"
    text: |
      "在某些重要方面，这五家公司——伊藤忠、丸红、三菱、三井和住友——实行的股东友好政策远比美国企业的通常做法更为出色。自我们开始买入以来，每一家都以有吸引力的价格回购并减少了流通股数量。"
    source_page: "companies/三井物产"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["三井物产", "商社"]
    attribution: "2023 巴菲特致股东信
\"伯克希尔开始买入五家日本公司的股票已近六年。这五家公司的经营方式在某种程度上与伯克希尔颇为相似，而且都非常成功。\""
    source_letter_year: 2023
    source_letter_category: "shareholder-letter"

  - id: "web-companies-三菱商事-01"
    text: |
      "伯克希尔开始买入五家日本公司的股票已近六年。这五家公司的经营方式在某种程度上与伯克希尔颇为相似，而且都非常成功。这些大型企业各自拥有大量业务的权益，其中许多扎根于日本，也有一些在全球各地运营。"
    source_page: "companies/三菱商事"
