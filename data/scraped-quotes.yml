    source_letter_year: 1963
    source_letter_category: "partnership-letter"

  - id: "web-concepts-买入价格-05"
    text: |
      "我们喜欢买入价格低于价值的证券，但更喜欢以合理价格收购经营良好的企业。"
    source_page: "concepts/买入价格"
    type: "web-quote"
    extraction_source: "website"
    tags: ["买入价格", "估值"]
    attribution: "2008 巴菲特致股东信"
    source_letter_year: 2008
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-买入价格-06"
    text: |
      "对投资者来说，即便是一家极其优秀的公司，买入价格过高就可能抵消其后十年靓丽的业务发展。"
    source_page: "concepts/买入价格"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["买入价格", "估值"]

  - id: "web-concepts-买入价格-07"
    text: |
      "有时候一只股票的买入价格高得离谱，就会让一家出色的企业变成一笔糟糕的投资——即便不是永久的，至少也会痛苦很长时间。"
    source_page: "concepts/买入价格"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["买入价格", "估值"]

  - id: "web-concepts-买入价格-08"
    text: |
      "如果你以足够低的价格买入一只股票，通常会在公司经营中出现某个小阳春，给你一个以不错的利润出手的机会，即使这家公司的长期表现可能很糟糕。我称这为'烟蒂'投资法。在路边捡到的烟蒂头可能只剩最后一口，抽不了多少过瘾的，但'廉价买入'让这最后一口也全是利润。"
    source_page: "concepts/买入价格"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["买入价格", "估值"]

  - id: "web-concepts-买入价格-09"
    text: |
      "以合理的价格买入一家好公司，远远好过以便宜的价格买入一家普通的公司。查理很早就明白这个道理；我的反应比较迟钝。"
    source_page: "concepts/买入价格"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["买入价格", "估值"]

  - id: "web-concepts-买入价格-10"
    text: |
      "50多年前，查理就告诉我：以合理的价格买一家优秀的公司，远比以便宜的价格买一家平庸的公司要好。尽管他的道理令人信服，我还是时不时犯捡便宜的老毛病，结果从勉强凑合到一塌糊涂不等。"
    source_page: "concepts/买入价格"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["买入价格", "估值"]

  - id: "web-concepts-买入价格-11"
    text: |
      "不论主动还是被动，控制类投资有一点是必须做到的：买入时就要把利润锁定在里面。这类投资的先决条件是一个有吸引力的买入价格。"
    source_page: "concepts/买入价格"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["买入价格", "估值"]

  - id: "web-concepts-买入价格-12"
    text: |
      "只要买入价格合理，长期来看市场几乎必然会认可留存收益的累积效果。时不时你甚至还能收到蛋糕上的糖霜——市场增值远远超过买入后的累积留存收益。"
    source_page: "concepts/买入价格"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["买入价格", "估值"]

  - id: "web-concepts-企业文化-01"
