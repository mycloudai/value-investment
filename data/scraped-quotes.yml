    source_letter_year: 1986
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-账面价值-02"
    text: |
      "当然，真正重要的是每股内在价值，而非账面价值。账面价值是一个会计概念，衡量的是一家企业投入的资本，包括留存收益在内。内在价值则是对一家企业在其剩余寿命中所能产出的现金流的折现估计值。"
    source_page: "concepts/账面价值"
    type: "web-quote"
