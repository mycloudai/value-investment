    text: |
      "只要买入价格合理，长期来看市场几乎必然会认可留存收益的累积效果。时不时你甚至还能收到蛋糕上的糖霜
    source_page: "concepts/买入价格"
    type: "web-quote"
    extraction_source: "website"
    tags: ["买入价格", "估值"]
    attribution: "市场增值远远超过买入后的累积留存收益。\""
    source_letter_year: 1980
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-买入价格-04"
    text: |
      "不论主动还是被动，控制类投资有一点是必须做到的：买入时就要把利润锁定在里面。这类投资的先决条件是一个有吸引力的买入价格。"
