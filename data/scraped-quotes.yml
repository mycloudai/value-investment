  - id: "local-partnership-letters-1963-md-08"
    text: |
      （1）我们做的这门生意，需要耐心。它和一个装满风头正劲的热门股的投资组合几乎没有共同点——在后者大行其道的岁月里，我们可能看起来格外沉闷。 对于我们正在买入的股票，它们的价格几个月甚至几年纹丝不动，这对我们来说其实是好事。这也说明，评判我们的业绩，需要足够的时间维度。我们认为，最少要看三年。 （2）我们不能谈论我们正在进行的投资。这种开口就说的做法，绝不可能改善我们的结果，在某些情况下甚至会造成严重损害。因此，不论是谁——包括合伙人在内——如果问我们是否看好某只股票，我们只能援引"宪法第五修正案"，保持沉默。
    source_page: "partnership-letters/1963.md"
