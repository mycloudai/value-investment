  - id: "local-partnership-letters-1957-md-01"
    text: |
      我认为股市整体定价高于内在价值，尤其是蓝筹股。如果判断属实，则所有股票——不论估值高低——都面临大幅下跌的可能。不管怎样，我认为五年后回头再看，人们不太可能觉得现在的价格是便宜的。即便全面熊市来袭，我们的套利类（work-outs）投资的市场价值受到的冲击也应该相当有限。 如果整体市场回归低估状态，我们可能会把全部资金都押在低估类（general issues）上，届时或许还会借钱加仓。反之，若市场继续大幅走高，我们的策略是在低估类获利时逐步了结，同时加大套利类投资组合的比重。 以上这些话并不是想说市场分析是我考虑问题的首要出发点。无论何时，我的主要精力始终放在寻找严重低估的证券上。
    source_page: "partnership-letters/1957.md"
    type: "blockquote"
    extraction_source: "local-md"
