  - id: "local-partnership-letters-1966-md-03"
    text: |
      1. 1965 年 1 月 18 日的信中介绍了上述各个投资类别。如果你需要回顾一下，在附近的报刊亭又买不到便携版，欢迎向我们索取。 2. 分类不是严丝合缝的。一笔投资归在哪个类别，事后不会更改，但最初归类时多少有些主观因素。 3. 计算合伙基金收益率时，我们以年初投资金额为基准。上述表格记录的是各类投资的平均投资金额，这样计算出来的收益率比实际低。例如，一只股票，我们 1 月 1 日以 100 美元买入，到 12 月 31 日，它上涨到 150 美元，则平均投资金额是 125 美元，收益率是 40%，而按照常用的计算方法，收益率则是 50%。换言之，上表中的平均投资金额是以每月的平均市值计算的。 4. 所有数字均按照 100% 自有资金、无杠杆的基础计算。利息和日常费用从总收益中扣除，不分摊到各个类别。与具体某笔投资直接相关的费用，例如，因做空股票而支付的股息，直接从相应类别中扣除。在涉及融券做空的情况下，计算平均投资金额时，用多头仓位减去空头仓位得出净投资金额。 5. 上述表格用处有限。各个投资类别的收益都主要是一两笔投资贡献的。如果你收集了大量稳定的数据（例如，美国男性的死亡率），就可以从中得出一些结论和预测，但我们的投资不是这么回事。我们在投资中面临的是一系列不知何时出现、各有不同特点的事件，我们要前思后想，琢磨各种可能性，然后做出决定。 6. 最后，我们在进行上述计算时不像数钱时那么上心，再说这也算不上纯粹的自检，所以里面可能有笔误或计算错误。
    source_page: "partnership-letters/1966.md"
    type: "blockquote"
    extraction_source: "local-md"
    tags: ["1966", "信件"]
    page_title: "1966年巴菲特致合伙人信（中文全文）"
    source_letter_year: 1966
