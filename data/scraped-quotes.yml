  - id: "web-concepts-透视盈余-02"
    text: |
      "我认为衡量我们收益最好的方法是用'透视收益'的概念，计算方式如下：取2.5亿美元，这大约是我们在1990年应占的被投资公司保留经营收益；扣除3,000万美元
    source_page: "concepts/透视盈余"
    type: "web-quote"
    extraction_source: "website"
    tags: ["透视盈余", "会计"]
    attribution: "如果这2.5亿美元以股息形式支付给我们，我们需要额外缴纳的税款；将余下的2.2亿美元加上我们3.71亿美元的报告经营收益。这样，我们1990年的'透视收益'大约为5.9亿美元。\"——1990 巴菲特致股东信"
    source_letter_year: 1990
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-透视盈余-03"
    text: |
      "虽然没有任何单一数字能做到完美，但我们相信透视收益比GAAP数字更能准确反映伯克希尔的真实盈利状况。"
    source_page: "concepts/透视盈余"
    type: "web-quote"
    extraction_source: "website"
    tags: ["透视盈余", "会计"]
    attribution: "1992 巴菲特致股东信"
    source_letter_year: 1992
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-透视盈余-04"
    text: |
      "要使伯克希尔的内在价值平均每年增长15%，我们的透视收益也必须以大致相同的速度增长。我们需要现有被投资公司给予大力支持，同时也需要不时增添新的成员，才能达到这15%的目标。"
    source_page: "concepts/透视盈余"
    type: "web-quote"
    extraction_source: "website"
    tags: ["透视盈余", "会计"]
    attribution: "1989 巴菲特致股东信"
    source_letter_year: 1989
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-透视盈余-06"
    text: |
      "你必须判断的是，这些未分配的收益对我们的价值，是否等同于我们已经入账的那些收益。我们相信它们是同等价值的——甚至可能更有价值。之所以得出这个'一鸟在林胜于二鸟在手'的结论，原因在于这些被投资公司的留存收益，是由才华横溢、以股东利益为导向的管理者在运用，他们有时能在自己的业务中找到比我们更好的资金用途。"
    source_page: "concepts/透视盈余"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["透视盈余", "会计"]

  - id: "web-concepts-通货膨胀-01"
    text: |
      "高通胀率相当于对资本额外征了一次税，使得大部分企业投资变得不明智......一般纳税投资者现在就好比在一台不断加速向下滑动的自动扶梯上拼命往上跑，结果净进步为零。"
    source_page: "concepts/通货膨胀"
    type: "web-quote"
    extraction_source: "website"
    tags: ["通货膨胀", "宏观"]
    attribution: "1980 巴菲特致股东信"
    source_letter_year: 1980
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-通货膨胀-02"
    text: |
      "政府决定了货币的最终价值，而系统性力量有时会驱使政府采取导致通货膨胀的政策。这些政策时不时就会失控。"
    source_page: "concepts/通货膨胀"
    type: "web-quote"
    extraction_source: "website"
    tags: ["通货膨胀", "宏观"]
    attribution: "2011 巴菲特致股东信"
    source_letter_year: 2011
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-通货膨胀-03"
    text: |
      "如果财政上胡来，纸币的价值可以灰飞烟灭......固定利息的债券无法抵御失控的通货膨胀。"
    source_page: "concepts/通货膨胀"
    type: "web-quote"
    extraction_source: "website"
    tags: ["通货膨胀", "宏观"]
    attribution: "2024 巴菲特致股东信"
    source_letter_year: 2024
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-通货膨胀-04"
    text: |
      "伯克希尔也能在一定程度上抵御通货膨胀的失控，但这个属性远非完美。巨额且根深蒂固的财政赤字是有后果的。"
    source_page: "concepts/通货膨胀"
    type: "web-quote"
    extraction_source: "website"
    tags: ["通货膨胀", "宏观"]
    attribution: "2022 巴菲特致股东信"
    source_letter_year: 2022
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-通货膨胀-05"
    text: |
      "高通胀率相当于对资本额外征了一次税，使得大部分企业投资变得不明智——至少以给股东创造正的实际投资回报这个标准来衡量的话。"
    source_page: "concepts/通货膨胀"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["通货膨胀", "宏观"]
    attribution: "1980 巴菲特致股东信"
    source_letter_year: 1980
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-通货膨胀-06"
    text: |
      "因为企业的平均股本回报率已被通胀对资本征收的隐性税和对股利及留存收益增值征收的显性税完全抵销。"
    source_page: "concepts/通货膨胀"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["通货膨胀", "宏观"]
    attribution: "1980 巴菲特致股东信"
    source_letter_year: 1980
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-通货膨胀-07"
    text: |
      "这种受青睐的企业必须具备两个特征：(1) 能够相当轻松地提价（即使产品需求平稳、产能尚未充分利用），而不必担心市场份额或销量的大幅流失；(2) 只需少量额外的资本投入，便能承受营业额的大幅增长（这种增长更多来自通胀而非实际产量）。"
    source_page: "concepts/通货膨胀"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["通货膨胀", "宏观"]
    attribution: "1981 巴菲特致股东信"
    source_letter_year: 1981
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-通货膨胀-08"
    text: |
      "过去一个世纪，这些投资工具摧毁了很多国家投资者的购买力，即使这些持有人按时收到了利息和本金。而且，这种丑陋的结果将来一定会反复重现。政府决定了货币的最终价值，而系统性力量有时会驱使政府采取导致通货膨胀的政策。"
    source_page: "concepts/通货膨胀"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["通货膨胀", "宏观"]
    attribution: "2011 巴菲特致股东信"
    source_letter_year: 2011
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-铁路运输-01"
    text: |
      "铁路对美国经济的未来至关重要。从成本、燃料消耗和碳排放强度来看，铁路显然是将重型货物运送到遥远目的地的最高效方式。没有铁路，这个国家就运转不了。"
    source_page: "concepts/铁路运输"
    type: "web-quote"
    extraction_source: "website"
    tags: ["铁路", "行业"]
    attribution: "2023 巴菲特致股东信"
    source_letter_year: 2023
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-铁路运输-02"
    text: |
      "要复制这些资产至少需要5,000亿美元和几十年时间……这也解释了为什么2010年我们能以重置价值的一小部分就买下了BNSF。"
    source_page: "concepts/铁路运输"
    type: "web-quote"
    extraction_source: "website"
    tags: ["铁路", "行业"]
    attribution: "2023 巴菲特致股东信"
    source_letter_year: 2023
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-铁路运输-03"
    text: |
      "一百年后，BNSF仍将是这个国家和伯克希尔的重要资产。你们尽管放心。"
    source_page: "concepts/铁路运输"
    type: "web-quote"
    extraction_source: "website"
    tags: ["铁路", "行业"]
    attribution: "2023 巴菲特致股东信"
    source_letter_year: 2023
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-银行业-01"
    text: |
      "银行业不必是一个糟糕的生意。如果管理层能够管好贷款和控制成本，净资产收益率可以达到20%或更高。但如果管理层犯下严重错误
    source_page: "concepts/银行业"
    type: "web-quote"
    extraction_source: "website"
    tags: ["银行业", "行业"]
    attribution: "这在银行业并不罕见——股东就会血本无归。\""
    source_letter_year: 1991
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-银行业-02"
    text: |
      "我还犯了一些其他已经显而易见的错误。2008年我花了2.44亿美元买了两家在我看来很便宜的爱尔兰银行的股票。到年底亏损89%。网球场上的人会管我这种失误叫'非受迫性失误'。"
    source_page: "concepts/银行业"
    type: "web-quote"
    extraction_source: "website"
    tags: ["银行业", "行业"]
    attribution: "2008 巴菲特致股东信"
    source_letter_year: 2008
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-长期持有-01"
    text: |
      "当我们持有既拥有出色业务又拥有出色管理层的公司股份时，我们最喜欢的持有期限是
    source_page: "concepts/长期持有"
    type: "web-quote"
    extraction_source: "website"
    tags: ["长期持有", "投资策略"]
    attribution: "永远。\""
    source_letter_year: 1988
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-长期持有-02"
    text: |
      "我们不会仅仅因为股价上涨了或者我们已经持有了很长时间就卖出。（在华尔街的种种格言中，最愚蠢的莫过于'赚到钱的人不会破产。'）"
    source_page: "concepts/长期持有"
    type: "web-quote"
    extraction_source: "website"
    tags: ["长期持有", "投资策略"]
    attribution: "1987 巴菲特致股东信"
    source_letter_year: 1987
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-长期持有-03"
    text: |
      "符合这些标准的股票，我们打算长期持有；事实上，我们最大的一笔股权投资是467,150股华盛顿邮报B股，成本约1060万美元，我们计划永久持有。"
    source_page: "concepts/长期持有"
    type: "web-quote"
    extraction_source: "website"
    tags: ["长期持有", "投资策略"]
    attribution: "1975 巴菲特致股东信"
    source_letter_year: 1975
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-长期持有-04"
    text: |
      "可口可乐和运通给我们的启示是什么？当你找到一家真正优秀的企业，紧紧抓住它。耐心总有回报，一家优秀的企业足以抵消一堆不可避免的平庸决策。"
    source_page: "concepts/长期持有"
    type: "web-quote"
    extraction_source: "website"
    tags: ["长期持有", "投资策略"]
    attribution: "2023 巴菲特致股东信"
    source_letter_year: 2023
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-长期持有-06"
    text: |
      每当查理和我为伯克希尔旗下的保险公司购买普通股时，我们的态度就好像是在收购一家私营企业的全部股权一样。我们考察的是这家企业的经济前景、负责经营的管理层，以及我们必须支付的价格。我们从不设定卖出的时间或价格。事实上，只要预期企业的内在价值能以令人满意的速度增长，我们愿意无限期地持有一只股票。在做投资时，我们把自己定位为企业分析师——而非市场分析师、宏观经济分析师，甚至也不是证券分析师。
    source_page: "concepts/长期持有"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["长期持有", "投资策略"]

  - id: "web-concepts-长期持有-07"
    text: |
      不过我们需要强调的是，我们不会仅仅因为股价上涨了或者我们已经持有了很长时间就卖出。（在华尔街的种种格言中，最愚蠢的莫过于"赚到钱的人不会破产。"）只要所持企业预期的股本回报率令人满意、管理层能干且正直、市场没有过度高估，我们非常乐意无限期地持有一只股票。
    source_page: "concepts/长期持有"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["长期持有", "投资策略"]

  - id: "web-concepts-长期持有-08"
    text: |
      整个2023年，我们没有买卖一股运通或可口可乐——延续了我们如瑞普·凡·温克尔般的酣睡，如今已经持续了远超二十年。去年两家公司再次通过增加利润和分红来回报我们的"不作为"。事实上，2023年我们在运通上对应的收益已经大大超过了当初购买它时花的13亿美元。
    source_page: "concepts/长期持有"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["长期持有", "投资策略"]

  - id: "web-concepts-长期持有-09"
    text: "可口可乐和运通给我们的启示是什么？当你找到一家真正优秀的企业，紧紧抓住它。耐心总有回报，一家优秀的企业足以抵消一堆不可避免的平庸决策。"
    source_page: "concepts/长期持有"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["长期持有", "投资策略"]

  - id: "web-concepts-集中投资-01"
    text: |
      "如果你的后宫有四十个女人，你永远也不会真正了解她们中的任何一个。"
    source_page: "concepts/集中投资"
    type: "web-quote"
    extraction_source: "website"
    tags: ["集中投资", "投资策略"]
    attribution: "1984 巴菲特致股东信（引用比利·罗斯）"
    source_letter_year: 1984
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-集中投资-02"
    text: |
      "我们相信，集中持股的策略完全可以降低风险，前提是它能促使投资者在买入之前更加深入地思考一项业务，并对其经济特征有更高的舒适度。"
    source_page: "concepts/集中投资"
    type: "web-quote"
    extraction_source: "website"
    tags: ["集中投资", "投资策略"]
    attribution: "1993 巴菲特致股东信"
    source_letter_year: 1993
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-集中投资-03"
    text: |
      "能够同时满足这些条件的投资机会并不多见，这也是我们集中持股的原因之一。我们实在找不到一百只符合我们投资要求的股票。但集中持有少数我们认定具有吸引力的标的，我们感到十分踏实。"
    source_page: "concepts/集中投资"
    type: "web-quote"
    extraction_source: "website"
    tags: ["集中投资", "投资策略"]
    attribution: "1976 巴菲特致股东信"
    source_letter_year: 1976
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-集中投资-04"
    text: |
      "我个人超过99%的身家都押在伯克希尔身上，而且很乐意让我的太太或基金会继续保持这种集中投资。"
    source_page: "concepts/集中投资"
    type: "web-quote"
    extraction_source: "website"
    tags: ["集中投资", "投资策略"]
    attribution: "2003 巴菲特致股东信"
    source_letter_year: 2003
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-集中投资-05"
    text: |
      "当'笨钱'认识到自己的局限时，它就不再笨了。"
    source_page: "concepts/集中投资"
    type: "web-quote"
    extraction_source: "website"
    tags: ["集中投资", "投资策略"]
    attribution: "1993 巴菲特致股东信"
    source_letter_year: 1993
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-集中投资-06"
    text: |
      "我们的投资选择立足长期，所考量的因素与100%收购一家企业时并无二致：（1）良好的长期经济特质；（2）称职且诚实的管理层；（3）以私有化标准衡量具有吸引力的买入价格；（4）我们所熟悉的行业，且有能力判断其长期商业特征。能够同时满足这些条件的投资机会并不多见，这也是我们集中持股的原因之一。我们实在找不到一百只符合我们投资要求的股票。"
    source_page: "concepts/集中投资"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["集中投资", "投资策略"]

  - id: "web-concepts-集中投资-07"
    text: |
      "我们采取的策略与标准的分散化教条背道而驰。因此很多专家会说我们的策略一定比传统投资者的风险更高。我们不同意。我们相信，集中持股的策略完全可以降低风险，前提是它能促使投资者在买入之前更加深入地思考一项业务，并对其经济特征有更高的舒适度。在表达这个观点时，我们对风险的定义与字典一样，就是'遭受损失或伤害的可能性'。"
    source_page: "concepts/集中投资"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["集中投资", "投资策略"]

  - id: "web-concepts-集中投资-08"
    text: |
      "按照贝塔理论，一只相对于大盘大幅下跌的股票——就像1973年我们买入华盛顿邮报时那样——在低价位时反而比在高价位时'风险更高'。如果有人以极低的价格把整家公司卖给你，难道你也会觉得这笔交易风险更高吗？"
    source_page: "concepts/集中投资"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["集中投资", "投资策略"]

  - id: "web-concepts-集中投资-09"
    text: |
      "另一种需要广泛分散的情况是：一个投资者虽然看不懂具体行业的经济特征，但相信长期持有美国整体产业是有利的。这样的投资者应该广泛持有大量公司的股票，并把买入时间拉长。例如，通过定期投资指数基金，一个什么都不懂的投资者往往能跑赢大多数投资专家。矛盾的是，当'笨钱'认识到自己的局限时，它就不再笨了。"
    source_page: "concepts/集中投资"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["集中投资", "投资策略"]

  - id: "web-concepts-集中投资-10"
