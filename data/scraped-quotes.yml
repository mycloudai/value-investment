  - id: "local-shareholder-letters-2016-md-01"
    text: |
      从2008年1月1日开始到2017年12月31日结束的十年期间，标普500指数的表现将超过一组对冲基金的基金组合——以扣除费用、成本和开支后的净值来衡量。 许多非常聪明的人试图在证券市场上取得超越平均水平的业绩。我们称他们为主动投资者。 与他们相对的是被动投资者，按定义他们的业绩大致等于市场平均水平。总体来看，他们的持仓大致等同于一只指数基金。因此，市场中的另一方——主动投资者——整体业绩也必须大致等于平均水平。然而，主动投资者将承担远高于被动投资者的成本。所以，总体而言，扣除这些成本后，他们的整体业绩将不如被动投资者。 当高昂的年度管理费、高额的绩效提成和频繁交易的成本全部加到主动投资者的等式中时，成本就会飙升。FOF基金更是加剧了成本问题，因为它们在底层对冲基金收取的高额费用之上又叠加了自己的费用。 有许多聪明的人在运营对冲基金。但在很大程度上，他们的努力互相抵消了，而且他们的高智商无法克服他们强加给投资者的成本。平均而言，随着时间推移，投资低成本指数基金的表现将优于一组FOF基金。
    source_page: "shareholder-letters/2016.md"
    type: "blockquote"
    extraction_source: "local-md"
