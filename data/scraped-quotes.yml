  - id: "local-partnership-letters-1969-october-md-02"
    text: |
      (1) 在我讲的情况中，我是以联邦所得税税档为 40% 并且需要缴纳所在州所得税的个人为例。税法改革正在进行，将来税法改革后，按照现在的税法计算的免税收入、资本利得以及其他投资收益可能会减少。税法改革会越来越深入。整体而言，将来税法改革后，也不会影响我对当前免税债券与股票税后收益的对比预期，甚至会对我的预期有微小的推动作用。 (2) 我这里说的预期是今后十年，不是今后几个星期或几个月。在一个较长的时间里会发生什么，这个比较容易想明白。要知道短期内会发生什么，就比较难了。正如本•格雷厄姆所说：“长期看，股市是称重机。短期看，股市是投票器。”重量是基本面决定的，这个比较容易评估。投票是心理决定的，这个比较难以捉摸。 (3) 目前，被动投资免税债券可以获得 6.5% 的收益率。相应标的的质地特别好，而且想买多长时间的都可以。等到三月份，比尔和我帮大家挑选债券的时候不一定还存在这个情况，但现在是这样。 (4) 今后十年，股票投资的整体收益率可能不会超过 9%，其中包括 3% 的分红，以及 6% 的价值提升。国民生产总值每年的增长速度不会超过 6%，公司利润的增长速度不可能比国民生产总值增速高多少，在市盈率不变的情况下（按上述假设以及当前利率，市盈率应该不会变），美国公司的整体价值的长期复合增长率应该不会超过每年 6%。按照这个股市整体水平，对于上述纳税人而言，股息税后收益率是 1.75%，资本利得税后收益率是 4.75%，整体税后收益率是 6.5%。股息和资本利得的税前收益率也有可能分别是 4% 和 5%，这样的话，整体税后收益率就要更低一些。历史水平大致如此，而且我认为将来税法可能会规定征收更高的资本利得税。 (5) 今后十年，在所有投资股票的资金中，或许有一半将由职业基金经理掌管。投资者把资产交给基金经理掌管，他们获得的整体业绩不可能和平均水平有多大差别（即税后 6.5%，如果我的假设正确的话）。 我的判断是：在未来整个十年里，在职业基金经理掌管的资金中，不到 10%（领先的这部分资金规模约 400 亿美元）能超过整体预期水平，每年平均领先两个百分点。那些风格激进的基金的收益率不太可能比一般基金的收益率高多少。目前，各种风格基金的基金掌管着 500 亿美元，规模是十年前类似风格基金的 100 倍。500 亿的规模根本不可能取得超额收益。 如果你运气特别好，选到的基金经理能把业绩做到全国最高的 1% 到 2%（因为他们业绩太优秀了，必然会管理大量资金），我觉得你每年的收益率最多也就比整体预期水平高 4 个点。比尔•鲁安有很大的概率，能成为这些最优秀基金经理中的一员。按我的估算，在今后十年中，真正特别优秀的基金经理能为“一般纳税人”带来 1.75% 的股息税后收益率和 7.75% 的资本利得税后收益率，即整体收益率为 9.5%。 (6) 于是，我们可以得出这样一个令人吃惊的结论：与历史相比，当今的情况不同寻常，被动投资于免税债券取得的收益率，与职业基金经理投资股票的预期收益率完全不相上下，只比最优秀的股票投资收益率略为逊色。 (7) 关于通货膨胀：通货膨胀与上述计算无关，但是与上面假设的国民生产总值 6% 的增长率有关，而且也是当前免税债券收益率达到 6.5% 的原因之一。如果股票的税后收益率是 8%，而债券的收益率是 4%，无论股价上涨下跌，还是横盘不动，持有股票都比持有债券好。但是，当债券的税后收益率是 6.5%，而股票的收益率是 6% 时，那就反过来了。有一个最简单、最实际的道理：无论美元上涨下跌，还是横盘不动，我们最应当关注的都是哪个投资的预期税后收益率最高。
    source_page: "partnership-letters/1969-october.md"
