  - id: "web-concepts-账面价值-05"
    text: |
      "账面价值这张记分卡越来越脱离经济现实。"
    source_page: "concepts/账面价值"
    type: "web-quote"
    extraction_source: "website"
    tags: ["账面价值", "估值"]
    attribution: "2018 巴菲特致股东信"
    source_letter_year: 2018
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-账面价值-06"
    text: |
      "会计准则要求我们旗下的运营企业以远低于其当前价值的金额计入账面价值，这种偏差近年来越来越大。随着时间推移，伯克希尔很可能将成为自身股票的重要回购方，而回购价格将高于账面价值但低于我们估计的内在价值。这种回购的数学原理很简单：每一笔交易都会使每股内在价值上升，而每股账面价值下降。两者结合的结果，是账面价值这张记分卡越来越脱离经济现实。"
    source_page: "concepts/账面价值"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["账面价值", "估值"]
    attribution: "2018 巴菲特致股东信"
    source_letter_year: 2018
    source_letter_category: "shareholder-letter"

