    attribution: "1999 巴菲特致股东信"
    source_letter_year: 1999
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-科技与互联网-03"
    text: |
      "简单易懂的商业模式（如果涉及大量高科技，我们搞不明白）。"
    source_page: "concepts/科技与互联网"
