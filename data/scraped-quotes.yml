  - id: "local-partnership-letters-1967-october-md-01"
    text: |
      1. 过去十年里，市场环境日渐改变，用定量分析方法判断，一眼看上去就很便宜的股票骤然减少。 2. 人们一窝蜂地追逐投资业绩（几年前，倡导衡量投资业绩的人没几个，我是其中之一，没想到现在变成了这样），市场变得极度亢奋，我的分析方法没了用武之地。 3. 我们的资产规模已经达到 6500 万美元，好的投资机会却如同一条日渐干涸的小溪，越来越少。这个问题我在 1967 年 1 月的信中讲过的，它一直困扰着我们。 4. 当年的我，比现在年轻、比现在穷，为了追求高超的投资业绩不顾一切，现在我对高超业绩的追求已不复当年那么强烈。
    source_page: "partnership-letters/1967-october.md"
    type: "blockquote"
    extraction_source: "local-md"
    tags: ["1967-october", "信件"]
    page_title: "1967年巴菲特致合伙人信（中文全文）"
    source_letter_year: 1967
    source_letter_category: "partnership-letter"

  - id: "local-partnership-letters-1967-october-md-02"
    text: |
      “在证券投资中，预测市场走势，忽略商业估值的行为经常盛行。我们不会效仿。近年来，这种投资风气经常能迅速赚大钱，就在我写这封信的这个月就是如此。这个投资方法是否合理？我无法证实，也无法否认。我的理智（或许是我的偏见）不完全认同这种投资方法，我的秉性也绝对不适合这种投资方法。我不会拿自己的钱这么投资，也绝对不会拿各位的钱这么投资。”
    source_page: "partnership-letters/1967-october.md"
    type: "blockquote"
    extraction_source: "local-md"
