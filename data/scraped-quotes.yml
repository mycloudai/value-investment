    source_letter_year: 2007
    source_letter_category: "shareholder-letter"

  - id: "web-companies-国民保险公司-01"
    text: |
      "1967年初，我让伯克希尔花860万美元收购了国民保险公司，这是一家位于奥马哈的小型但前途光明的保险公司。保险正中我的甜蜜区：我理解这个行业，也喜欢它。"
    source_page: "companies/国民保险公司"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["国民保险", "保险"]
    attribution: "2014 伯克希尔的过去现在与未来
\"自从1967年以860万美元收购国民保险公司以来，财产意外险一直是推动我们扩张的引擎。如今，按净资产衡量，国民保险是全世界最大的财产意外险公司。\""
    source_letter_year: 2016
    source_letter_category: "shareholder-letter"

  - id: "web-companies-大都会通信-01"
    text: |
      "大都会通信公司的汤姆·墨菲——他堪称双料冠军，收购标的精准锁定在第一类公司，而自身的经营才华又使他成为第二类的领军人物。"
    source_page: "companies/大都会通信"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["大都会", "媒体"]
    attribution: "1981 巴菲特致股东信
\"我们对Cap Cities的投资使我们与一个卓越的业务组合和一群杰出的人结成了联盟——而且我们喜欢这种大手笔参与的机会。\""
    source_letter_year: 1981
    source_letter_category: "shareholder-letter"

  - id: "web-companies-威瑞森通讯-01"
    text: "威瑞森在2020年以87亿美元的巨额投入首次出现在伯克希尔的前十五大持仓中，持股比例达3.5%。这笔投资的建仓规模之大，表明它经过了深思熟虑的决策过程。"
    source_page: "companies/威瑞森通讯"
    type: "web-blockquote"
    extraction_source: "website"
