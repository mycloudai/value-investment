      6月18日，董秘表示："联合石油已收到通知，国税局初步拟定了有利裁定，但还需经过更多审批人员的核准。公司仍期待7月内收到裁定。" 7月24日，公司总裁表示，他预计"下周初"就能收到国税局裁定。 8月13日，公司财务主管告知，德州国家石油、联合石油和南加州大学的代表已齐聚华盛顿，共同推动裁定落地。 9月18日，公司财务主管告知："没有新消息，不过国税局说裁定下周就能出来。"
