    source_letter_year: 1996
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-科技与互联网-01"
    text: |
      "我们不持有科技股，尽管我们和大家一样认为科技产品和服务将深刻改变我们的社会。我们的问题在于，我们无法判断科技行业中的哪些参与者拥有真正持久的竞争优势。"
    source_page: "concepts/科技与互联网"
    type: "web-quote"
    extraction_source: "website"
    tags: ["科技", "行业"]
    attribution: "1999 巴菲特致股东信"
    source_letter_year: 1999
    source_letter_category: "shareholder-letter"

  - id: "web-concepts-科技与互联网-02"
    text: |
      "如果说我们有什么本事的话，那就是我们清楚知道自己什么时候在能力圈内游刃有余，什么时候正在接近边界。"
    source_page: "concepts/科技与互联网"
