  - id: "local-partnership-letters-1962-mid-year-md-01"
    text: |
      **一个预测** 老读者（我这是王婆卖瓜，自卖自夸了）看到我开口预测，肯定觉得我反常。预测这件事，我一向敬而远之，现在也是——通常意义上如此。 我肯定不会预测明后两年的宏观经济或股市走向，因为我完全不知道。 不过有一点我相当确定：今后十年里，有几年大盘会涨20%到25%，有几年会跌差不多的幅度，其余大多数年份则夹在中间。哪年涨、哪年跌，我毫无头绪，长期投资者也不必太在意。 放眼足够长的时间，我认为道指含股息和市值增长的年复合收益率大概在5%到7%之间。这几年大市涨得不少，但要是期望大市长期能超过这个水平，恐怕要失望了。 我们的工作是年复一年积累相对道指的超额收益，不必太纠结某一年的绝对结果是正还是负。一年里，若我们跌15%而道指跌25%，在我看来，比我们和道指都涨20%的年份要好得多。我和合伙人一再强调这一点，也亲眼看着他们点头，有人深信不疑，有人半信半疑。 这一点对我非常重要：我希望你不仅在脑子里认同这个逻辑，更要打心底里接受它。 正如在介绍我们投资方法时所说的，我们相对道指最出色的年份，很可能出现在下跌或横盘的市场里。因此，我们取得的超额优势会时多时少，差异相当大。有些年份我们肯定会落后道指，但如果从长期来看，我们能平均每年跑赢道指10个百分点，我就认为这是令人满意的结果。 具体而言：如果某年市场下跌35%或40%（今后十年里某一年出现这种情况的概率相当大，但谁也不知道是哪年），我们应该只跌15%或20%；如果道指基本持平，我们应该能涨约10个百分点；如果道指涨超20%，我们很难跟上。长期保持这样的表现，假设道指年复合收益率在5%到7%，我们的目标是每年15%到17%。 这些预期听起来或许有些大胆，等到1965年或1970年回头来看，很可能显得更加大胆
    source_page: "partnership-letters/1962-mid-year.md"
    type: "blockquote"
    extraction_source: "local-md"
    tags: ["1962-mid-year", "信件"]
    page_title: "1962年巴菲特致合伙人信（中文全文）"
    attribution: "也可能完全证明是错的。但我认为合伙人有权知道我的真实想法，尽管这一行的特点就是让预期很容易出错。单独某一年，波动可能相当剧烈。1961年正是如此，幸运的是，波动的方向是向上的。可不能每次都这么走运！"
    source_letter_year: 1962
