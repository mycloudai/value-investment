    source_letter_category: "shareholder-letter"

  - id: "web-companies-喜诗糖果-01"
    text: |
      "让我们来看看这种梦幻般生意的原型——我们自己的喜诗糖果（See's Candies）。"
    source_page: "companies/喜诗糖果"
    type: "web-blockquote"
    extraction_source: "website"
    tags: ["喜诗糖果", "品牌"]
