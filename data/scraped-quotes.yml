quotes:

  - id: "web-berkshire-1984-巴菲特致股东信-01"
    text: |
      1984年我们的净资产增加了1.526亿美元，每股约增长133美元。这个数字听起来还不错，但实际上只能算中等水平。经济收益必须与产生它的资本相比较来评估。过去二十年来，我们每股账面价值的年复合增长率为22.1%（从1964年的19.46美元增长到1984年的1,108.77美元），但1984年的增长率只有13.6%。
    source_page: "berkshire/1984-巴菲特致股东信"
    type: "web-summary"
    extraction_source: "website"
    tags: ["1984", "股东信"]

  - id: "web-berkshire-1984-巴菲特致股东信-02"
    text: "正如我们去年讨论过的，每股内在商业价值的增长才是真正重要的经济衡量标准。不过内在商业价值的计算涉及太多主观判断。就我们的情况来说，账面价值是一个有用的替代指标，虽然有些低估。在我看来，1984年内在价值和账面价值的增长幅度大致相当。"
    source_page: "berkshire/1984-巴菲特致股东信"
    type: "web-summary"
    extraction_source: "website"
    tags: ["1984", "股东信"]

  - id: "web-berkshire-1987-巴菲特致股东信-01"
    text: "1987年，我们的净资产增加了4.64亿美元，增幅为19.5%。自现任管理层接手的23年以来，每股账面价值由19.46美元增长到2,477.47美元，年复合增长率约为23.1%。"
    source_page: "berkshire/1987-巴菲特致股东信"
    type: "web-summary"
    extraction_source: "website"
    tags: ["1987", "股东信"]

  - id: "web-berkshire-2008-巴菲特致股东信-01"
    text: "注释： 数据为日历年度数据，以下例外：1965年和1966年为截至9月30日的年度；1967年为截至12月31日的15个月。"
    source_page: "berkshire/2008-巴菲特致股东信"
    type: "web-summary"
    extraction_source: "website"
