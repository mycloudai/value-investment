<!DOCTYPE html>

    <button id="sidebar-toggle" class="sidebar-toggle" aria-label="折叠侧边栏" title="折叠侧边栏">

        <polyline points="15 18 9 12 15 6"/>
      </svg>
      <span class="sidebar-toggle-label">点击 - 收起导航</span>
    </button>

  <button id="hamburger" class="hamburger" aria-label="打开菜单">☰</button>

  <header class="site-header" id="site-header">
    <button id="search-open-btn" class="search-open-btn" title="搜索 (Cmd+K)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      搜索
      <kbd class="search-kbd-hint">⌘K</kbd>
    </button>
  </header>

  <button class="mobile-search-btn" id="mobile-search-btn" aria-label="搜索">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
  </button>

  <main class="main-content" id="main">
    <div id="app-content">
      <div style="display:flex;justify-content:center;align-items:center;min-height:60vh;color:var(--text-muted,#888)">
        载入中...
      </div>
    </div>
  </main>

  <!-- Xref Chip Modal -->
  <!-- Help Modal -->
  <div id="help-modal-overlay" class="help-modal-overlay" style="display:none" role="dialog" aria-modal="true" aria-label="使用帮助">
    <div class="help-modal">
      <div class="help-modal-header">
        <h2>📖 使用帮助</h2>
        <button class="help-modal-close" id="help-modal-close" aria-label="关闭帮助">✕</button>
      </div>

        <div style="text-align:center;padding:40px;color:var(--text-muted)">加载中...</div>
      </div>
    </div>
  </div>

  <div id="xref-modal-overlay" class="xref-modal-overlay" style="display:none">
    <div class="xref-modal" id="xref-modal">
      <div class="xref-modal-header">
        <h3 id="xref-modal-title"></h3>
        <button class="xref-modal-close" id="xref-modal-close" aria-label="关闭">✕</button>
      </div>
      <div class="xref-modal-body" id="xref-modal-body"></div>
      <div class="xref-modal-footer" id="xref-modal-footer"></div>

      <kbd class="search-modal-esc">ESC</kbd>
      <button id="search-modal-close" class="search-modal-close-btn" aria-label="关闭">✕</button>
    </div>
    <div id="search-modal-results" class="search-modal-results"></div>
    <div class="search-modal-footer">
      <span>↑↓ 导航</span><span>↵ 跳转</span><span>ESC 关闭</span>

  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>

  <!-- App scripts (order matters) -->
  <script src="/assets/js/app.js"></script>
  <script src="/assets/js/nav.js"></script>
  <script src="/assets/js/search.js"></script>
  <script src="/assets/js/graph.js"></script>
  <script src="/assets/js/talk.js"></script>
