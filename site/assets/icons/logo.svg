<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" width="200" height="48">
  <defs>
    <linearGradient id="bgLogo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A5F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0A1628;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lineLogo" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38BDF8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563EB;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 图标区域背景 -->
  <rect width="44" height="44" x="2" y="2" rx="8" ry="8" fill="url(#bgLogo)"/>

  <!-- 折线图 -->
  <polyline
    points="8,36 14,28 20,32 28,18 38,10"
    fill="none"
    stroke="url(#lineLogo)"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <circle cx="8"  cy="36" r="2" fill="#38BDF8"/>
  <circle cx="14" cy="28" r="2" fill="#38BDF8"/>
  <circle cx="20" cy="32" r="2" fill="#38BDF8"/>
  <circle cx="28" cy="18" r="2" fill="#60A5FA"/>
  <circle cx="38" cy="10" r="2.5" fill="#FFFFFF"/>

  <!-- 网站名称 -->
  <text
    x="54"
    y="20"
    font-family="Georgia, 'Noto Serif SC', serif"
    font-size="13"
    font-weight="bold"
    fill="#FFFFFF"
  >MyCloudAI</text>

  <!-- 副标题 -->
  <text
    x="54"
    y="36"
    font-family="'Noto Serif SC', Georgia, serif"
    font-size="11"
    fill="#38BDF8"
    letter-spacing="1"
  >价值投资</text>
</svg>
